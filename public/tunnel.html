<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>✨ Birthday Tunnel</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }

    html, body {
      width: 100%; height: 100vh; height: 100dvh;
      background: #000;
      overflow: hidden;
      user-select: none;
      cursor: grab;
      -webkit-tap-highlight-color: transparent;
      touch-action: none;
    }
    body.dragging { cursor: grabbing; }

    /* ── PERSPECTIVE VIEWPORT ── */
    #vp {
      width: 100%; height: 100%;
      perspective: 850px;
      perspective-origin: 50% 50%;
    }

    /* ── 3-D SCENE  (rotation applied here by JS) ── */
    #scene {
      width: 100%; height: 100%;
      transform-style: preserve-3d;
      transform: rotateX(0deg) rotateY(0deg);
    }

    /* ── TUNNEL ITEMS ── */
    .ti {
      position: absolute;
      left: 50%; top: 50%;
      pointer-events: none;
      will-change: transform, opacity;
      /* fly: Z -1800 → +500  */
      animation: ti-fly var(--dur) linear var(--del) forwards;
      opacity: 0;
    }

    @keyframes ti-fly {
      0% {
        transform: translate(-50%,-50%)
                   translateX(var(--ox)) translateY(var(--oy))
                   translateZ(-1800px)
                   rotate(var(--ra));
        opacity: 0;
      }
      6%  { opacity: 0.95; }
      85% { opacity: 0.90; }
      100% {
        transform: translate(-50%,-50%)
                   translateX(var(--ox)) translateY(var(--oy))
                   translateZ(520px)
                   rotate(var(--rb));
        opacity: 0;
      }
    }

    /* Text items */
    .ti-text {
      font-family: 'Dancing Script', cursive;
      font-weight: 700;
      font-size: var(--fs);
      color: var(--col);
      text-shadow:
        0 0 6px  var(--glow),
        0 0 20px var(--glow),
        0 0 50px var(--glow2);
      white-space: nowrap;
      line-height: 1;
    }

    /* Emoji / heart items */
    .ti-emoji {
      font-size: var(--fs);
      line-height: 1;
      display: block;
      filter: drop-shadow(0 0 10px var(--glow))
              drop-shadow(0 0 22px var(--glow2));
    }

    /* Image items */
    .ti img {
      display: block;
      width: var(--fs);
      height: auto;
      filter: drop-shadow(0 0 14px var(--glow))
              drop-shadow(0 0 30px var(--glow2));
    }

    /* ── EDGE VIGNETTE (depth feel) ── */
    #vignette {
      position: fixed; inset: 0; z-index: 20;
      background: radial-gradient(
        ellipse 80% 80% at 50% 50%,
        transparent 45%,
        rgba(0,0,0,0.55) 100%
      );
      pointer-events: none;
    }

    /* ── CENTER GLOW (vanishing point illusion) ── */
    #center-glow {
      position: fixed;
      left: 50%; top: 50%;
      width: 180px; height: 180px;
      transform: translate(-50%,-50%);
      background: radial-gradient(circle, rgba(255,100,200,0.07) 0%, transparent 70%);
      border-radius: 50%;
      pointer-events: none;
      z-index: 1;
      animation: glow-pulse 3s ease-in-out infinite;
    }
    @keyframes glow-pulse {
      0%,100% { opacity:0.6; transform:translate(-50%,-50%) scale(1);   }
      50%      { opacity:1;   transform:translate(-50%,-50%) scale(1.3); }
    }

    /* ── DRAG INDICATOR ── */
    #drag-ring {
      position: fixed;
      left: 50%; top: 50%;
      width: 64px; height: 64px;
      transform: translate(-50%,-50%);
      border: 1.5px solid rgba(255,140,210,0.35);
      border-radius: 50%;
      pointer-events: none;
      z-index: 25;
      opacity: 0;
      transition: opacity 0.4s;
    }
    #drag-ring.active { opacity: 1; }

    /* ── HINT TEXT ── */
    #hint {
      position: fixed;
      bottom: 30px; left: 50%;
      transform: translateX(-50%);
      color: rgba(255,160,220,0.65);
      font-family: sans-serif;
      font-size: 12px;
      letter-spacing: 0.7px;
      pointer-events: none;
      z-index: 30;
      text-shadow: 0 0 14px rgba(255,80,180,0.4);
      white-space: nowrap;
      animation: hint-fade 6s 1s ease forwards;
    }
    @keyframes hint-fade { 0%,55%{opacity:1;} 100%{opacity:0;} }

    /* ── NAV BUTTON ── */
    #back-btn {
      position: fixed;
      top: 18px; left: 18px;
      z-index: 30;
      background: rgba(255,130,200,0.10);
      border: 1px solid rgba(255,130,200,0.28);
      border-radius: 20px;
      padding: 7px 16px;
      color: rgba(255,190,235,0.75);
      font-size: 11px;
      cursor: pointer;
      backdrop-filter: blur(10px);
      font-family: sans-serif;
      letter-spacing: 0.3px;
      transition: background 0.2s, color 0.2s;
      pointer-events: all;
    }
    #back-btn:hover {
      background: rgba(255,130,200,0.22);
      color: rgba(255,210,245,0.95);
    }
  </style>
</head>
<body>

<div id="vp">
  <div id="scene"></div>
</div>

<div id="vignette"></div>
<div id="center-glow"></div>
<div id="drag-ring"></div>

<div id="hint">✦ Kéo / Drag để đổi hướng bay ✦</div>
<button id="back-btn" onclick="history.back()">← Quay lại</button>

<script>
/* ================================================================
   DATA
   ================================================================ */
const TEXTS = [
  'Chúc mừng sinh nhật 🎂',
  'Happy Birthday! 🎉',
  'Sinh nhật vui vẻ ✨',
  'Tuổi mới bình an 🌸',
  'Hạnh phúc mãi mãi 💕',
  'Vạn sự như ý ✨',
  'Sức khỏe dồi dào 🍀',
  'Ước mơ thành hiện thực',
  'Luôn tươi trẻ 🌺',
  'Happy B-day 🎁',
  'Yêu đời yêu người 💖',
  'Ngày mới rực rỡ ☀️',
  '🎈 Chúc mừng 🎈',
  'Một tuổi mới tuyệt vời',
  'Thật nhiều niềm vui 💐',
  'Mãi mãi trẻ đẹp 🌟',
  'Ngập tràn hạnh phúc 🥳',
];

const IMAGES = [
  'data/hoa1.png','data/hoa2.png',
  'data/hoa3.webp','data/hoa4.png',
];

const EMOJIS = [
  '❤️','🩷','💕','💗','💖','💝',
  '✨','🌸','🎀','🌺','🎊','🎉',
  '⭐','🌟','💫','🍀','🌈',
];

const COLORS = [
  { col:'#ff9ecd', glow:'#ff3090',   glow2:'rgba(255,48,144,0.22)'   },
  { col:'#fde68a', glow:'#f59e0b',   glow2:'rgba(245,158,11,0.22)'   },
  { col:'#ffffff', glow:'#c084fc',   glow2:'rgba(192,132,252,0.22)'  },
  { col:'#f9a8d4', glow:'#ec4899',   glow2:'rgba(236,72,153,0.22)'   },
  { col:'#d8b4fe', glow:'#9333ea',   glow2:'rgba(147,51,234,0.22)'   },
  { col:'#fbbf24', glow:'#f59e0b',   glow2:'rgba(251,191,36,0.22)'   },
  { col:'#86efac', glow:'#22c55e',   glow2:'rgba(34,197,94,0.22)'    },
  { col:'#67e8f9', glow:'#06b6d4',   glow2:'rgba(6,182,212,0.22)'    },
  { col:'#ff6b9d', glow:'#ff1a6e',   glow2:'rgba(255,26,110,0.22)'   },
  { col:'#fff0f5', glow:'#ff9ecd',   glow2:'rgba(255,158,205,0.20)'  },
];

/* ================================================================
   HELPERS
   ================================================================ */
const rand  = (a, b) => a + Math.random() * (b - a);
const pick  = arr   => arr[Math.floor(Math.random() * arr.length)];
const scene = document.getElementById('scene');

/* ================================================================
   SPAWN
   ================================================================ */
function spawnItem() {
  const clr   = pick(COLORS);
  const angle  = Math.random() * Math.PI * 2;
  const radius = rand(30, 620);           /* spread from tunnel centre */
  const ox     = Math.cos(angle) * radius;
  const oy     = Math.sin(angle) * radius;
  const dur    = rand(4.0, 6.5);
  const del    = rand(0, 0.35);
  /* subtle spin while flying */
  const ra     = rand(-60, 60);
  const rb     = ra + rand(-40, 40);

  const el = document.createElement('div');
  el.className = 'ti';
  el.style.setProperty('--ox',   ox + 'px');
  el.style.setProperty('--oy',   oy + 'px');
  el.style.setProperty('--dur',  dur + 's');
  el.style.setProperty('--del',  del + 's');
  el.style.setProperty('--ra',   ra  + 'deg');
  el.style.setProperty('--rb',   rb  + 'deg');
  el.style.setProperty('--glow',  clr.glow);
  el.style.setProperty('--glow2', clr.glow2);
  el.style.setProperty('--col',   clr.col);

  /* ── choose type ── */
  const rng = Math.random();
  if (rng < 0.52) {
    /* TEXT */
    el.classList.add('ti-text');
    el.textContent = pick(TEXTS);
    el.style.setProperty('--fs', rand(11, 30) + 'px');

  } else if (rng < 0.78) {
    /* FLOWER IMAGE */
    const img = document.createElement('img');
    img.src = pick(IMAGES);
    img.draggable = false;
    el.appendChild(img);
    el.style.setProperty('--fs', rand(50, 140) + 'px');

  } else {
    /* EMOJI */
    el.classList.add('ti-emoji');
    el.textContent = pick(EMOJIS);
    el.style.setProperty('--fs', rand(18, 55) + 'px');
    el.style.filter =
      `drop-shadow(0 0 10px ${clr.glow}) drop-shadow(0 0 24px ${clr.glow2})`;
  }

  scene.appendChild(el);
  /* cleanup slightly after animation ends */
  setTimeout(() => el.remove(), (dur + del + 0.4) * 1000);
}

/* Prime the tunnel with an initial burst so it feels full immediately */
for (let i = 0; i < 40; i++) setTimeout(spawnItem, i * 55);

/* Continuous stream */
setInterval(spawnItem, 125);

/* ================================================================
   DRAG-TO-STEER
   ================================================================ */
let rotX = 0, rotY = 0;
let isDragging = false;
let lastX = 0, lastY = 0;
let velX = 0, velY = 0;
let rafId = null;
const MAX_ROT = 70;
const SENSITIVITY = 0.20;
const FRICTION    = 0.88;

const dragRing = document.getElementById('drag-ring');

function setScene() {
  scene.style.transform = `rotateX(${rotX}deg) rotateY(${rotY}deg)`;
}

function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }

function startDrag(x, y) {
  isDragging = true;
  lastX = x; lastY = y;
  velX = velY = 0;
  cancelAnimationFrame(rafId);
  document.body.classList.add('dragging');
  dragRing.classList.add('active');
}

function moveDrag(x, y) {
  if (!isDragging) return;
  const dx = x - lastX;
  const dy = y - lastY;
  velX = dx * SENSITIVITY;
  velY = dy * SENSITIVITY;
  rotY = clamp(rotY + velX, -MAX_ROT, MAX_ROT);
  rotX = clamp(rotX - velY, -MAX_ROT, MAX_ROT);
  setScene();
  lastX = x; lastY = y;
}

function endDrag() {
  if (!isDragging) return;
  isDragging = false;
  document.body.classList.remove('dragging');
  dragRing.classList.remove('active');

  /* inertia glide */
  function glide() {
    velX *= FRICTION;
    velY *= FRICTION;
    if (Math.abs(velX) < 0.04 && Math.abs(velY) < 0.04) return;
    rotY = clamp(rotY + velX, -MAX_ROT, MAX_ROT);
    rotX = clamp(rotX - velY, -MAX_ROT, MAX_ROT);
    setScene();
    rafId = requestAnimationFrame(glide);
  }
  glide();
}

/* ── MOUSE ── */
document.getElementById('vp').addEventListener('mousedown', e => {
  startDrag(e.clientX, e.clientY);
});
window.addEventListener('mousemove', e => moveDrag(e.clientX, e.clientY));
window.addEventListener('mouseup',   endDrag);
window.addEventListener('mouseleave', endDrag);

/* ── TOUCH ── */
document.getElementById('vp').addEventListener('touchstart', e => {
  const t = e.touches[0];
  startDrag(t.clientX, t.clientY);
}, { passive: true });

window.addEventListener('touchmove', e => {
  if (!isDragging) return;
  const t = e.touches[0];
  moveDrag(t.clientX, t.clientY);
}, { passive: true });

window.addEventListener('touchend',    endDrag);
window.addEventListener('touchcancel', endDrag);

/* ── GYROSCOPE (mobile device tilt, optional) ── */
if (typeof DeviceOrientationEvent !== 'undefined') {
  let gyroEnabled = false;
  window.addEventListener('deviceorientation', e => {
    if (isDragging) return;                    /* drag takes priority */
    if (!gyroEnabled) { gyroEnabled = true; }
    const targetX = clamp((e.beta  - 45) * 0.4, -MAX_ROT, MAX_ROT);
    const targetY = clamp( e.gamma * 0.5,        -MAX_ROT, MAX_ROT);
    rotX += (targetX - rotX) * 0.08;           /* smooth lerp */
    rotY += (targetY - rotY) * 0.08;
    setScene();
  });
}
</script>
</body>
</html>
