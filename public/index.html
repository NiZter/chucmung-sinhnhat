<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Falling Rain ♥</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Montserrat:wght@900&display=swap" rel="stylesheet">
  <link rel="preload" href="data/sticker.gif" as="image">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100vh;
      height: 100dvh;
      overflow: hidden;
      background: #000;
      font-family: monospace;
    }

    /* =====================================================
       GIFT INTRO OVERLAY
       ===================================================== */
    #gift-intro {
      position: fixed; inset: 0; z-index: 1001;
      background: radial-gradient(ellipse at 50% 42%, #1c0a2e 0%, #0e0018 58%, #060008 100%);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      transition: opacity 1.1s ease;
    }
    #gift-intro.gi-hide { opacity: 0; pointer-events: none; }

    /* Stars canvas inside intro */
    #gi-stars {
      position: absolute; inset: 0; pointer-events: none;
    }

    /* Box outer wrapper — handles float + shake */
    #box-wrap {
      position: relative; z-index: 2;
      display: flex; flex-direction: column; align-items: center;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transform: scale(clamp(0.65, 20vmin, 1.15));
      transform-origin: center bottom;
    }
    #box-wrap.floating { animation: box-float 3s ease-in-out infinite; }
    @keyframes box-float {
      0%, 100% { transform: scale(clamp(0.65,20vmin,1.15)) translateY(0); }
      50%       { transform: scale(clamp(0.65,20vmin,1.15)) translateY(-14px); }
    }
    #box-wrap.shake { animation: box-shake 0.44s ease both !important; }
    @keyframes box-shake {
      0%  { transform: scale(clamp(0.65,20vmin,1.15)) translateX(0) rotate(0); }
      10% { transform: scale(clamp(0.65,20vmin,1.15)) translateX(-10px) rotate(-4deg); }
      22% { transform: scale(clamp(0.65,20vmin,1.15)) translateX(10px) rotate(4deg); }
      34% { transform: scale(clamp(0.65,20vmin,1.15)) translateX(-8px) rotate(-3deg); }
      46% { transform: scale(clamp(0.65,20vmin,1.15)) translateX(8px) rotate(3deg); }
      58% { transform: scale(clamp(0.65,20vmin,1.15)) translateX(-5px) rotate(-1.5deg); }
      70% { transform: scale(clamp(0.65,20vmin,1.15)) translateX(5px) rotate(1.5deg); }
      82% { transform: scale(clamp(0.65,20vmin,1.15)) translateX(-2px) rotate(-0.5deg); }
      100%{ transform: scale(clamp(0.65,20vmin,1.15)) translateX(0) rotate(0); }
    }

    /* Bow */
    #box-bow {
      font-size: 58px; line-height: 1;
      margin-bottom: -8px; position: relative; z-index: 4;
      filter: drop-shadow(0 5px 14px rgba(0,0,0,0.55));
      pointer-events: none; user-select: none;
      transition: opacity 0.25s, transform 0.25s;
    }

    /* Lid */
    #box-lid {
      width: 234px; height: 56px;
      background: linear-gradient(140deg, #fff6f6 0%, #fde9e9 55%, #fbd6d6 100%);
      border-radius: 8px 8px 0 0;
      position: relative; overflow: hidden; z-index: 3;
      box-shadow: 0 -6px 22px rgba(130,0,0,0.13), 0 2px 0 rgba(0,0,0,0.07);
      transform-origin: bottom center;
    }
    #box-lid.lid-open {
      animation: lid-flip 0.7s cubic-bezier(0.4,0,0.55,1) forwards;
    }
    @keyframes lid-flip {
      0%   { transform: perspective(700px) rotateX(0);                         opacity: 1; }
      55%  { transform: perspective(700px) rotateX(-135deg);                   opacity: 0.7; }
      100% { transform: perspective(700px) rotateX(-158deg) translateY(-22px); opacity: 0; }
    }
    #box-lid::before { /* vertical ribbon */
      content: ''; position: absolute;
      top:0; left:50%; transform:translateX(-50%);
      width:24px; height:100%;
      background: linear-gradient(180deg,#9b1c1c,#7f1d1d);
    }
    #box-lid::after { /* horizontal ribbon */
      content: ''; position: absolute;
      top:50%; transform:translateY(-50%);
      width:100%; height:18px;
      background: linear-gradient(90deg,transparent 0%,#9b1c1c 8%,#b91c1c 50%,#9b1c1c 92%,transparent 100%);
    }

    /* Body */
    #box-body {
      width: 216px; height: 188px;
      background: linear-gradient(150deg, #fff9f9 0%, #fde8e8 42%, #fadada 100%);
      border-radius: 0 0 10px 10px;
      position: relative; overflow: hidden; z-index: 2;
      box-shadow:
        0 22px 55px rgba(0,0,0,0.6),
        0 8px 22px rgba(120,0,0,0.2),
        inset 0 2px 0 rgba(255,255,255,0.55);
    }
    #box-body::before { /* vertical ribbon */
      content: ''; position: absolute;
      top:0; left:50%; transform:translateX(-50%);
      width:24px; height:100%;
      background: linear-gradient(180deg,#9b1c1c,#7f1d1d);
    }
    #box-body::after { /* horizontal ribbon */
      content: ''; position: absolute;
      top:40%; transform:translateY(-50%);
      width:100%; height:20px;
      background: linear-gradient(90deg,transparent 0%,#9b1c1c 5%,#b91c1c 50%,#9b1c1c 95%,transparent 100%);
    }
    #box-glow { /* pink glow when lid opens */
      position:absolute; inset:0;
      background: radial-gradient(ellipse at 50% 0%, rgba(255,170,195,1) 0%, rgba(255,100,140,0.55) 38%, transparent 70%);
      opacity:0; transition:opacity 0.45s ease;
      pointer-events:none;
    }

    /* Hint text */
    #gift-hint {
      position: relative; z-index: 2;
      margin-top: 34px;
      font-family: 'Dancing Script', cursive;
      font-size: clamp(14px,3.5vw,19px);
      color: rgba(218,175,255,0.72);
      animation: hint-pulse 2.3s ease-in-out infinite;
      pointer-events: none; user-select: none;
      text-shadow: 0 0 12px rgba(140,60,230,0.3);
    }
    @keyframes hint-pulse {
      0%,100% { opacity:0.72; transform:translateY(0); }
      50%     { opacity:1;    transform:translateY(-3px); }
    }
    #gift-hint.gone { opacity:0; transition:opacity 0.3s; }

    /* =====================================================
       FLOWER LAYER
       ===================================================== */
    #flower-layer {
      position: fixed; inset: 0; overflow: hidden;
      pointer-events: none; z-index: 1003;
    }
    /* Rain flowers (CSS animation) */
    .fl-rain {
      position: fixed;
      pointer-events: none;
      font-size: var(--fs);
      left: var(--lx);
      top: -70px;
      will-change: transform, opacity;
      animation: fl-fall var(--dur) linear var(--del) forwards;
    }
    @keyframes fl-fall {
      0%   { transform: translateY(0)      translateX(0)        rotate(0deg)       scale(1);        opacity: 0; }
      6%   { opacity: 1; }
      88%  { opacity: 0.92; }
      100% { transform: translateY(118vh)  translateX(var(--dx)) rotate(var(--rot)) scale(var(--sc)); opacity: 0; }
    }

    /* =====================================================
       RAIN (matrix chars)
       ===================================================== */
    #rain-wrap { position: fixed; inset: 0; background: #000; }
    #rc { display: block; width: 100%; height: 100%; }

    /* =====================================================
       FLASH (KÁ reveal)
       ===================================================== */
    #flash {
      position: fixed; inset: 0;
      background: rgba(255,235,180,0.88);
      opacity: 0; pointer-events: none; z-index: 9;
    }
    #flash.burst { animation: flash-burst 0.6s ease-out forwards; }
    @keyframes flash-burst {
      0%   { opacity: 0.55; }
      100% { opacity: 0; }
    }

    /* =====================================================
       SPARKLES
       ===================================================== */
    .sparkle {
      position: fixed; border-radius: 50%;
      pointer-events: none; z-index: 9;
      transform: translate(-50%, -50%);
      animation: sparkle-fly 1.1s ease-out forwards;
    }
    @keyframes sparkle-fly {
      0%   { opacity: 1; transform: translate(-50%,-50%) translate(0,0) scale(1); }
      100% { opacity: 0; transform: translate(-50%,-50%) translate(var(--tx),var(--ty)) scale(0.2); }
    }

    /* =====================================================
       COUNTDOWN
       ===================================================== */
    #cd-overlay {
      position: fixed; inset: 0; z-index: 8;
      display: flex; align-items: center; justify-content: center;
      pointer-events: none; opacity: 0;
    }
    #cd-text {
      color: #fff; text-align: center; line-height: 1.15;
      text-shadow: 0 2px 60px rgba(0,0,0,0.8), 0 0 18px rgba(180,100,255,0.18);
      white-space: pre-line;
    }
    #cd-text.num {
      font-family: 'Montserrat', sans-serif; font-weight: 900;
      font-size: clamp(80px,20vw,220px); letter-spacing: 0px;
      color: rgba(245,235,255,0.96);
    }
    #cd-text.word {
      font-family: 'Montserrat', sans-serif; font-weight: 900;
      font-size: clamp(26px,7vw,82px); letter-spacing: clamp(8px,2vw,18px);
      color: rgba(230,215,255,0.90);
    }
    #cd-text.name {
      font-family: 'Montserrat', sans-serif; font-weight: 900;
      font-size: clamp(52px,14vw,150px); letter-spacing: 16px;
    }
    #cd-text.ka {
      background: linear-gradient(135deg, #fde68a 0%, #ffffff 48%, #f59e0b 100%);
      -webkit-background-clip: text; background-clip: text;
      -webkit-text-fill-color: transparent; text-shadow: none;
      filter: drop-shadow(0 0 22px rgba(245,158,11,0.62));
    }
    #cd-text.ka.cd-anim {
      animation: ka-reveal 2.2s cubic-bezier(0.4,0,0.2,1) forwards !important;
    }
    @keyframes ka-reveal {
      0%   { opacity:0; letter-spacing:52px; transform:scale(1.7);  filter:blur(10px) drop-shadow(0 0 8px rgba(245,158,11,0.25)); }
      22%  { opacity:1; letter-spacing:16px; transform:scale(1);    filter:blur(0)    drop-shadow(0 0 22px rgba(245,158,11,0.62)); }
      75%  { opacity:1; letter-spacing:16px; transform:scale(1);    filter:           drop-shadow(0 0 22px rgba(245,158,11,0.62)); }
      100% { opacity:0; letter-spacing:16px; transform:scale(0.92); filter:blur(4px)  drop-shadow(0 0 4px rgba(245,158,11,0)); }
    }
    @keyframes cd-flash {
      0%   { opacity:0; transform:scale(2.0); filter:blur(6px); }
      18%  { opacity:1; transform:scale(1);   filter:blur(0); }
      72%  { opacity:1; transform:scale(1);   filter:blur(0); }
      100% { opacity:0; transform:scale(0.75); filter:blur(4px); }
    }
    .cd-anim { animation: cd-flash 1s cubic-bezier(0.4,0,0.2,1) forwards; }

    /* =====================================================
       LETTER OVERLAY
       ===================================================== */
    #letter-overlay {
      position: fixed; inset: 0;
      background: radial-gradient(ellipse at 50% 40%, #120828 0%, #070010 65%, #050008 100%);
      z-index: 10;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      font-family: Georgia, serif;
      transition: opacity 1.2s ease;
    }
    #letter-overlay::before {
      content: '';
      position: fixed; inset: 0;
      background:
        radial-gradient(ellipse at 20% 50%, rgba(120,40,200,0.09) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 30%, rgba(180,60,255,0.07) 0%, transparent 50%);
      pointer-events: none;
    }
    #letter-overlay.fade-out { opacity: 0; pointer-events: none; }

    #hint-click {
      position: absolute; bottom: 7%; left: 50%;
      transform: translateX(-50%);
      font-family: 'Dancing Script', cursive;
      font-size: clamp(13px,2vw,17px);
      color: rgba(215,175,255,0.80);
      opacity: 0; transition: opacity 1.4s ease;
      pointer-events: none; white-space: nowrap;
      text-shadow: 0 0 12px rgba(140,60,230,0.35);
    }

    /* =====================================================
       ENVELOPE
       ===================================================== */
    .scene {
      perspective: 1200px;
      width: min(92vw,820px);
      animation: scene-enter 1.4s cubic-bezier(0.2,0.8,0.2,1) both;
    }
    @keyframes scene-enter {
      0%   { opacity:0; transform:translateY(40px) scale(0.92); }
      100% { opacity:1; transform:translateY(0)    scale(1); }
    }
    .envelope {
      position: relative; width: 100%;
      height: min(62vh,500px);
      animation: float 5s ease-in-out infinite;
      filter: drop-shadow(0 0 30px rgba(140,40,255,0.35));
      transition: filter 0.3s;
    }
    @keyframes float {
      0%,100% { transform:translateY(0px); }
      50%     { transform:translateY(-14px); }
    }
    .envelope::before {
      content: '';
      position: absolute; inset: -30px;
      background: radial-gradient(ellipse at center, rgba(160,60,255,0.18) 0%, transparent 70%);
      z-index: 0; pointer-events: none;
      animation: aura 4s ease-in-out infinite;
    }
    @keyframes aura {
      0%,100% { opacity:0.6; transform:scale(1); }
      50%     { opacity:1;   transform:scale(1.08); }
    }
    .env-body {
      position: absolute; inset: 0;
      background:
        repeating-linear-gradient(-48deg,transparent,transparent 4px,rgba(255,255,255,0.012) 4px,rgba(255,255,255,0.012) 8px),
        linear-gradient(160deg,#1e1042 0%,#140830 55%,#0c0420 100%);
      border: 1px solid rgba(190,105,255,0.42);
      border-radius: 6px; z-index: 2;
      animation: border-pulse 3.5s ease-in-out infinite;
    }
    @keyframes border-pulse {
      0%,100% { border-color:rgba(165,60,240,0.35);  box-shadow:inset 0 0 35px rgba(70,8,150,0.14); }
      50%     { border-color:rgba(210,115,255,0.68); box-shadow:inset 0 0 55px rgba(120,28,210,0.24); }
    }
    .env-body::before {
      content:''; position:absolute; top:0; left:0; right:0; height:54%;
      background:linear-gradient(180deg,rgba(0,0,0,0.28) 0%,transparent 100%);
      border-radius:6px 6px 0 0; pointer-events:none; z-index:1;
    }
    .env-fold-left {
      position:absolute; inset:0;
      background:linear-gradient(125deg,rgba(55,8,120,0.55) 0%,rgba(35,4,80,0.25) 100%);
      clip-path:polygon(0 0,0 100%,50% 52%); z-index:3; border-radius:6px 0 0 6px;
    }
    .env-fold-right {
      position:absolute; inset:0;
      background:linear-gradient(235deg,rgba(55,8,120,0.55) 0%,rgba(35,4,80,0.25) 100%);
      clip-path:polygon(100% 0,50% 52%,100% 100%); z-index:3; border-radius:0 6px 6px 0;
    }
    .env-fold-bottom {
      position:absolute; inset:0;
      background:rgba(70,12,140,0.38);
      clip-path:polygon(0 100%,50% 52%,100% 100%); z-index:3;
    }
    .env-crease {
      position:absolute; inset:0; z-index:4; pointer-events:none;
    }
    .env-crease::before {
      content:''; position:absolute; top:52%; left:0; right:0; height:1px;
      background:linear-gradient(90deg,transparent 0%,rgba(170,90,255,0.35) 18%,rgba(210,130,255,0.55) 50%,rgba(170,90,255,0.35) 82%,transparent 100%);
    }
    .env-crease::after {
      content:''; position:absolute; left:50%; top:0; bottom:48%; width:1px;
      background:linear-gradient(180deg,transparent 0%,rgba(155,75,255,0.2) 25%,rgba(155,75,255,0.25) 90%,transparent 100%);
    }
    .env-flap {
      position:absolute; inset:0;
      background:linear-gradient(175deg,#221040 0%,#180830 100%);
      clip-path:polygon(0 0,100% 0,50% 50%);
      border-radius:6px 6px 0 0; z-index:4;
      transform-origin:50% 0%;
    }
    .env-flap::after {
      content:''; position:absolute; inset:0;
      background:linear-gradient(165deg,rgba(190,90,255,0.1) 0%,transparent 55%);
      clip-path:inherit;
    }
    .env-flap.open { animation: flap-open 0.48s cubic-bezier(0.4,0,0.6,1) forwards !important; }
    @keyframes flap-open {
      0%   { transform:scaleY(1);                       opacity:1; }
      55%  { transform:scaleY(-0.08) translateY(-6px);  opacity:0.4; }
      100% { transform:scaleY(-0.35) translateY(-14px); opacity:0; }
    }
    .stamp {
      position:absolute; top:10px; right:13px;
      width:38px; height:38px;
      border:2px dotted rgba(185,105,255,0.52); border-radius:3px;
      display:flex; align-items:center; justify-content:center;
      z-index:5; background:rgba(55,8,120,0.22);
    }
    .stamp-inner { font-size:18px; opacity:0.68; line-height:1; }
    .env-address {
      position:absolute; bottom:22%; left:50%;
      transform:translateX(-50%);
      text-align:center; z-index:5; pointer-events:none; white-space:nowrap;
    }
    .addr-to {
      font-family:'Dancing Script',cursive;
      font-size:clamp(14px,2.2vw,22px);
      color:rgba(210,162,255,0.52);
      margin-bottom:8px; letter-spacing:0.5px;
    }
    .addr-line { height:1px; width:clamp(90px,15vw,155px); background:rgba(180,100,255,0.2); margin:5px auto; border-radius:1px; }
    .addr-line.short { width:clamp(55px,9vw,96px); }
    .seal {
      position:absolute; top:50%; left:50%;
      transform:translate(-50%,-50%);
      width:86px; height:86px;
      border-radius:46% 54% 52% 48%/51% 49% 53% 47%;
      background:
        radial-gradient(circle at 35% 28%,rgba(255,200,255,0.18) 0%,transparent 36%),
        radial-gradient(circle at 38% 32%,#a21caf,#6b21a8 40%,#3b0764 75%);
      border:2px solid rgba(220,150,255,0.48);
      box-shadow:0 5px 22px rgba(0,0,0,0.70),inset 0 2px 8px rgba(240,175,255,0.24),inset 0 -4px 8px rgba(0,0,0,0.55),0 0 0 3px rgba(167,139,250,0.14);
      z-index:6; cursor:pointer; outline:none;
      display:flex; align-items:center; justify-content:center;
      animation:seal-glow 2.4s ease-in-out infinite;
      transition:transform 0.4s cubic-bezier(0.4,0,0.2,1),opacity 0.4s ease;
    }
    .seal-letter {
      font-family:'Dancing Script',cursive; font-size:36px; font-weight:700;
      color:rgba(248,218,255,0.90); line-height:1;
      text-shadow:0 1px 4px rgba(0,0,0,0.65),0 0 8px rgba(210,130,255,0.28);
      pointer-events:none; user-select:none;
    }
    @keyframes seal-glow {
      0%,100% { box-shadow:0 5px 22px rgba(0,0,0,0.70),inset 0 2px 8px rgba(240,175,255,0.24),inset 0 -4px 8px rgba(0,0,0,0.55),0 0 14px rgba(162,28,175,0.45); }
      50%     { box-shadow:0 5px 22px rgba(0,0,0,0.70),inset 0 2px 8px rgba(240,175,255,0.24),inset 0 -4px 8px rgba(0,0,0,0.55),0 0 34px rgba(192,58,210,0.85); }
    }
    .seal.break { transform:translate(-50%,-50%) scale(0) rotate(60deg); opacity:0; pointer-events:none; }
    .wax-drop {
      position:absolute;
      background:radial-gradient(circle at 34% 30%,#9e2ec0,#4d0082);
      border-radius:50%; z-index:5;
      box-shadow:0 1px 4px rgba(0,0,0,0.55);
    }
    @keyframes dissolve {
      0%   { opacity:1;   transform:scale(1)    translateY(0);    filter:blur(0px)  drop-shadow(0 0 30px rgba(160,60,255,0.4)); }
      40%  { opacity:0.9; transform:scale(1.05) translateY(-8px); filter:blur(2px)  drop-shadow(0 0 70px rgba(200,80,255,0.9)); }
      100% { opacity:0;   transform:scale(1.15) translateY(-20px);filter:blur(16px) drop-shadow(0 0 10px rgba(140,40,255,0)); }
    }
    .envelope.dissolve { animation:dissolve 0.95s cubic-bezier(0.4,0,0.2,1) forwards !important; }
    .seal-burst {
      position:absolute; top:50%; left:50%;
      width:0; height:0; border-radius:50%;
      pointer-events:none; z-index:7;
      transform:translate(-50%,-50%);
      background:radial-gradient(circle,rgba(255,235,180,0.92) 0%,rgba(245,158,11,0.38) 40%,transparent 70%);
    }
    .seal-burst.active { animation:burst 0.75s ease-out forwards; }
    @keyframes burst {
      0%   { width:0;     height:0;     opacity:1; }
      100% { width:420px; height:420px; opacity:0; }
    }
    .seal:focus-visible { outline:3px solid rgba(210,140,255,0.85); outline-offset:5px; }

    /* =====================================================
       UI BUTTONS
       ===================================================== */
    #play-btn {
      position:fixed; bottom:20px; left:50%;
      transform:translateX(-50%);
      z-index:200; display:none;
      align-items:center; gap:7px;
      background:rgba(245,158,11,0.16);
      border:1px solid rgba(245,158,11,0.45);
      border-radius:22px; padding:8px 20px;
      color:rgba(253,230,138,0.92); font-size:13px; cursor:pointer;
      backdrop-filter:blur(10px); white-space:nowrap;
      animation:play-pulse 2s ease-in-out infinite;
    }
    @keyframes play-pulse {
      0%,100% { box-shadow:0 0 0 0 rgba(245,158,11,0.35); }
      50%     { box-shadow:0 0 0 10px rgba(245,158,11,0); }
    }
    #lp-msg {
      position:fixed; top:50%; left:50%;
      transform:translate(-50%,-50%);
      z-index:300; display:none;
      background:rgba(55,8,115,0.94);
      border:1px solid rgba(200,140,255,0.65);
      border-radius:20px; padding:20px 32px;
      font-family:'Dancing Script',cursive;
      font-size:clamp(18px,3vw,24px);
      color:#f0d0ff; white-space:nowrap;
      backdrop-filter:blur(14px);
      box-shadow:0 8px 40px rgba(0,0,0,0.55);
      animation:lp-pop 0.35s cubic-bezier(0.34,1.56,0.64,1) both;
    }
    @keyframes lp-pop {
      from { opacity:0; transform:translate(-50%,-50%) scale(0.65); }
      to   { opacity:1; transform:translate(-50%,-50%) scale(1); }
    }
    #nav-overlay {
      position:fixed; inset:0; background:#000;
      z-index:9999; opacity:0;
      transition:opacity 0.42s ease;
      pointer-events:none;
    }
    #skip-hint {
      position:fixed; bottom:18px; left:50%;
      transform:translateX(-50%);
      font-size:12px; color:rgba(220,200,255,0.48);
      z-index:10; pointer-events:none;
      opacity:0; transition:opacity 0.5s;
      white-space:nowrap; letter-spacing:0.3px;
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration:0.01ms !important;
        animation-iteration-count:1 !important;
        transition-duration:0.01ms !important;
      }
    }
    @supports (padding: env(safe-area-inset-top)) {
      #play-btn  { bottom:max(20px,calc(env(safe-area-inset-bottom)+14px)); }
      #skip-hint { bottom:max(16px,calc(env(safe-area-inset-bottom)+10px)); }
      #hint-click{ bottom:max(7%,calc(env(safe-area-inset-bottom)+48px)); }
    }
    @media (max-height:520px) {
      .envelope { height:min(54vh,380px); }
      .seal { width:68px; height:68px; }
      .seal-letter { font-size:28px; }
    }
    @media (max-width:480px) {
      #lp-msg { padding:16px 22px; font-size:clamp(16px,4.2vw,20px); white-space:normal; text-align:center; max-width:85vw; }
    }
  </style>
</head>
<body>

<!-- ===== GIFT INTRO OVERLAY ===== -->
<div id="gift-intro">
  <canvas id="gi-stars"></canvas>
  <div id="box-wrap">
    <div id="box-bow">🎀</div>
    <div id="box-lid"></div>
    <div id="box-body">
      <div id="box-glow"></div>
    </div>
  </div>
  <p id="gift-hint">Chạm để mở quà 🎁</p>
</div>

<!-- ===== FLOWER LAYER ===== -->
<div id="flower-layer"></div>

<!-- ===== EXISTING CONTENT ===== -->
<div id="rain-wrap"><canvas id="rc"></canvas></div>
<audio id="bg-music" src="data/music_2.mp3" loop></audio>
<div id="flash"></div>
<div id="nav-overlay"></div>
<button id="play-btn" aria-label="Bật nhạc">▶ Bật nhạc</button>
<div id="lp-msg">Tớ biết là cậu sẽ thử mà 😏</div>
<div id="skip-hint">Nhấn Space hoặc chạm 2 lần để bỏ qua</div>

<div id="cd-overlay"><span id="cd-text"></span></div>

<div id="letter-overlay">
  <div class="scene">
    <div class="envelope" id="env">
      <div class="env-body"></div>
      <div class="env-fold-left"></div>
      <div class="env-fold-right"></div>
      <div class="env-fold-bottom"></div>
      <div class="env-crease"></div>

      <div class="stamp"><div class="stamp-inner">🌸</div></div>

      <div class="env-address">
        <div class="addr-to">Gửi: Hoàng Ly</div>
        <div class="addr-line"></div>
        <div class="addr-line short"></div>
      </div>

      <div class="env-flap" id="flap"></div>

      <div class="wax-drop" style="width:7px;height:6px;top:calc(50% - 54px);left:calc(50% + 50px)"></div>
      <div class="wax-drop" style="width:5px;height:5px;top:calc(50% + 46px);left:calc(50% - 52px)"></div>
      <div class="wax-drop" style="width:4px;height:4px;top:calc(50% - 46px);left:calc(50% - 44px)"></div>

      <button class="seal" id="seal" aria-label="Mở phong bì">
        <span class="seal-letter">CÁ</span>
      </button>
      <div class="seal-burst" id="burst"></div>
    </div>
  </div>
  <div id="hint-click">nhấn vào dấu sáp để mở</div>
</div>

<script>
  /* ============================================================
     GIFT INTRO — STARS BACKGROUND
     ============================================================ */
  (function () {
    const cv  = document.getElementById('gi-stars');
    const ctx = cv.getContext('2d');
    let stars = [];
    let raf;

    function resize() {
      cv.width  = window.innerWidth;
      cv.height = window.innerHeight;
      stars = Array.from({ length: 200 }, () => ({
        x: Math.random() * cv.width,
        y: Math.random() * cv.height,
        r: Math.random() * 1.2 + 0.2,
        a: Math.random()
      }));
    }
    function draw() {
      ctx.clearRect(0, 0, cv.width, cv.height);
      stars.forEach(s => {
        s.a += (Math.random() - 0.5) * 0.025;
        s.a = Math.max(0.08, Math.min(1, s.a));
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255,255,255,${s.a})`;
        ctx.fill();
      });
      raf = requestAnimationFrame(draw);
    }
    resize();
    draw();
    window.addEventListener('resize', resize);
    // Expose stop so we can cancel after intro
    window._stopGiStars = () => cancelAnimationFrame(raf);
  })();

  /* ============================================================
     GIFT INTRO — BOX INTERACTION
     ============================================================ */
  const boxWrap    = document.getElementById('box-wrap');
  const boxLid     = document.getElementById('box-lid');
  const boxBow     = document.getElementById('box-bow');
  const boxGlow    = document.getElementById('box-glow');
  const giftHint   = document.getElementById('gift-hint');
  const giftIntro  = document.getElementById('gift-intro');
  const flowerLayer= document.getElementById('flower-layer');
  const music      = document.getElementById('bg-music');

  const FLOWERS = ['🌸','🌺','🌹','🌷','🌼','💮','🏵️','🌸','🌺','🌹'];
  const FLOWERS_RAIN = ['🌸','🌺','🌹','🌷','🌼','💮','🌸','🌺','🌸','🌹'];

  // Start float animation
  boxWrap.classList.add('floating');

  let boxOpened = false;

  function spawnBurstFlowers() {
    // Get approximate box center in viewport
    const rect = boxWrap.getBoundingClientRect();
    const cx   = rect.left + rect.width  / 2;
    const cy   = rect.top  + rect.height / 2 - 20;

    const COUNT = 72;
    for (let i = 0; i < COUNT; i++) {
      const el  = document.createElement('div');
      const ang = (i / COUNT) * Math.PI * 2 + (Math.random() - 0.5) * 0.4;
      const spd = 0.3 + Math.random() * 0.7;
      const maxR = Math.min(window.innerWidth, window.innerHeight) * (0.38 + spd * 0.3);
      const dx  = Math.cos(ang) * maxR;
      const dy  = Math.sin(ang) * maxR - maxR * 0.25; // slight upward bias
      const fs  = 18 + Math.random() * 24;
      const rot = (Math.random() - 0.5) * 720;
      const dur = 0.9 + Math.random() * 0.9;
      const del = Math.random() * 0.18;

      el.style.cssText =
        `position:fixed;left:${cx}px;top:${cy}px;font-size:${fs}px;` +
        `pointer-events:none;will-change:transform,opacity;`;
      el.textContent = FLOWERS[Math.floor(Math.random() * FLOWERS.length)];
      flowerLayer.appendChild(el);

      el.animate([
        { transform:'translate(-50%,-50%) scale(0.2) rotate(0deg)', opacity:0 },
        { transform:`translate(calc(-50% + ${dx*0.18}px),calc(-50% + ${dy*0.18}px)) scale(1.3) rotate(${rot*0.2}deg)`, opacity:1, offset:0.18 },
        { transform:`translate(calc(-50% + ${dx*0.7}px),calc(-50% + ${dy*0.7}px)) scale(1.0) rotate(${rot*0.7}deg)`, opacity:0.95, offset:0.7 },
        { transform:`translate(calc(-50% + ${dx}px),calc(-50% + ${dy}px)) scale(0.65) rotate(${rot}deg)`, opacity:0 }
      ], {
        duration : dur * 1000,
        delay    : del * 1000,
        fill     : 'forwards',
        easing   : 'cubic-bezier(0.2,0.8,0.35,1)'
      });

      setTimeout(() => el.remove(), (dur + del + 0.15) * 1000);
    }
  }

  let rainInterval = null;
  let rainCount    = 0;

  function startFlowerRain() {
    const MAX = 160;
    rainInterval = setInterval(() => {
      if (rainCount >= MAX) { clearInterval(rainInterval); return; }
      const batch = 4 + Math.floor(Math.random() * 4); // 4-7 per tick
      for (let i = 0; i < batch; i++) {
        const el  = document.createElement('div');
        el.className = 'fl-rain';
        const fs  = 16 + Math.random() * 26;
        const lx  = (Math.random() * 110 - 5) + 'vw';
        const dx  = (Math.random() - 0.5) * 120;
        const rot = (Math.random() - 0.5) * 540;
        const sc  = 0.65 + Math.random() * 0.8;
        const dur = 3.2 + Math.random() * 2.4;
        const del = Math.random() * 0.6;
        el.style.setProperty('--fs',  fs  + 'px');
        el.style.setProperty('--lx',  lx);
        el.style.setProperty('--dx',  dx  + 'px');
        el.style.setProperty('--rot', rot + 'deg');
        el.style.setProperty('--sc',  sc  + '');
        el.style.setProperty('--dur', dur + 's');
        el.style.setProperty('--del', del + 's');
        el.textContent = FLOWERS_RAIN[Math.floor(Math.random() * FLOWERS_RAIN.length)];
        flowerLayer.appendChild(el);
        setTimeout(() => el.remove(), (dur + del + 0.2) * 1000);
      }
      rainCount += batch;
    }, 75);
  }

  function runGiftSequence() {
    if (boxOpened) return;
    boxOpened = true;

    // Hide hint
    giftHint.classList.add('gone');

    // Start music
    music.volume = 0.65;
    music.play().catch(() => {
      document.getElementById('play-btn').style.display = 'flex';
    });

    // Phase 1 — shake (0-440ms)
    boxWrap.classList.remove('floating');
    boxWrap.classList.add('shake');

    // Phase 2 — lid opens (440ms)
    setTimeout(() => {
      boxBow.style.opacity = '0';
      boxBow.style.transform = 'translateX(-50%) translateY(-20px) scale(0.5)';
      boxLid.classList.add('lid-open');
      boxGlow.style.opacity = '1';

      // Phase 3 — burst flowers (640ms)
      setTimeout(spawnBurstFlowers, 200);

      // Phase 4 — rain starts (1300ms after click)
      setTimeout(startFlowerRain, 860);

      // Phase 5 — begin fade-out (4600ms after click)
      setTimeout(() => {
        giftIntro.classList.add('gi-hide');
        // After fade completes, remove DOM + stop stars
        setTimeout(() => {
          giftIntro.remove();
          flowerLayer.remove();
          window._stopGiStars && window._stopGiStars();
        }, 1200);
      }, 4200);

    }, 440);
  }

  // Click / tap on box
  boxWrap.addEventListener('pointerdown', (e) => {
    e.preventDefault();
    runGiftSequence();
  });

  /* ============================================================
     MATRIX RAIN
     ============================================================ */
  const canvas = document.getElementById('rc');
  const ctx    = canvas.getContext('2d');

  const FS    = 12;
  const TRAIL = 38;
  const CHARS = ['♥', '✦', '❀', '✧'];
  const RAIN_RGB = [180, 60, 255];

  let cols, drops, speeds, lengths;
  let resizeTimer;

  function resize() {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(() => {
      const vp = window.visualViewport;
      canvas.width  = vp ? vp.width  : window.innerWidth;
      canvas.height = vp ? vp.height : window.innerHeight;
      init();
    }, 100);
  }

  function init() {
    cols    = Math.floor(canvas.width / FS);
    drops   = Array.from({ length: cols }, () => -(Math.random() * TRAIL * 2 | 0));
    speeds  = Array.from({ length: cols }, () => 0.10 + Math.random() * 0.18);
    lengths = Array.from({ length: cols }, () => Math.floor(TRAIL * 0.5 + Math.random() * TRAIL * 0.7));
  }

  function randChar() { return CHARS[Math.floor(Math.random() * CHARS.length)]; }

  function draw() {
    const [r, g, b] = RAIN_RGB;
    ctx.fillStyle = 'rgba(0,0,0,0.18)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.font = `${FS}px monospace`;
    ctx.textBaseline = 'top';

    for (let i = 0; i < cols; i++) {
      const head = drops[i];
      const len  = lengths[i];
      for (let j = 0; j < len; j++) {
        const row = head - j;
        const y   = row * FS;
        if (y < -FS || y > canvas.height) continue;
        const alpha = Math.pow(1 - j / len, 1.6) * (j === 0 ? 1 : 0.85);
        if (j === 0)    ctx.fillStyle = `rgba(255,220,235,${alpha})`;
        else if (j < 3) ctx.fillStyle = `rgba(${Math.min(255,r+30)},${Math.min(255,g+60)},${Math.min(255,b+40)},${alpha})`;
        else            ctx.fillStyle = `rgba(${r},${g},${b},${alpha * 0.9})`;
        ctx.fillText(randChar(), i * FS, y);
      }
      drops[i] += speeds[i];
      if (drops[i] * FS > canvas.height + len * FS) {
        drops[i]   = -(Math.random() * TRAIL | 0);
        lengths[i] = Math.floor(TRAIL * 0.4 + Math.random() * TRAIL * 0.8);
      }
    }
  }

  function loop() { draw(); requestAnimationFrame(loop); }
  resize();
  window.addEventListener('resize', resize);
  if (window.visualViewport) window.visualViewport.addEventListener('resize', resize);
  loop();

  /* ============================================================
     ENVELOPE / SEAL
     ============================================================ */
  const env      = document.getElementById('env');
  const flap     = document.getElementById('flap');
  const seal     = document.getElementById('seal');
  const overlay  = document.getElementById('letter-overlay');
  const hintEl   = document.getElementById('hint-click');
  const navOvl   = document.getElementById('nav-overlay');
  const playBtn  = document.getElementById('play-btn');
  const lpMsg    = document.getElementById('lp-msg');
  const skipHint = document.getElementById('skip-hint');

  // Music play button (fallback if autoplay from gift intro also blocked)
  playBtn.addEventListener('click', () => {
    music.play().catch(() => {});
    playBtn.style.display = 'none';
  });

  function navigateTo(href) {
    navOvl.style.pointerEvents = 'all';
    navOvl.style.opacity = '1';
    const origVol = music.volume;
    let step = 0;
    const iv = setInterval(() => {
      step++;
      music.volume = Math.max(0, origVol * (1 - step / 20));
      if (step >= 20) {
        clearInterval(iv);
        sessionStorage.setItem('musicTime',
          music.readyState >= 2 ? music.currentTime
            : parseFloat(sessionStorage.getItem('musicTime') || '0'));
        window.location.href = href;
      }
    }, 20);
  }

  // Long-press easter egg
  let lpTimer = null, lpFired = false;
  seal.addEventListener('pointerdown', () => {
    lpFired = false;
    lpTimer = setTimeout(() => {
      lpFired = true;
      lpMsg.style.display = 'block';
      setTimeout(() => { lpMsg.style.display = 'none'; }, 2800);
    }, 2000);
  });
  ['pointerup','pointermove','pointercancel'].forEach(ev =>
    seal.addEventListener(ev, () => clearTimeout(lpTimer)));

  const hintTimer = setTimeout(() => { hintEl.style.opacity = '1'; }, 3000);

  let sealOpened = false;
  seal.addEventListener('click', () => {
    if (lpFired || sealOpened) return;
    sealOpened = true;
    clearTimeout(hintTimer);
    hintEl.style.opacity = '0';
    localStorage.setItem('visited', '1');

    seal.classList.add('break');
    document.getElementById('burst').classList.add('active');
    music.play().catch(() => {});
    playBtn.style.display = 'none';

    setTimeout(() => { flap.classList.add('open'); }, 220);
    setTimeout(() => { env.classList.add('dissolve'); }, 640);
    setTimeout(() => {
      overlay.classList.add('fade-out');
      setTimeout(() => {
        overlay.style.display = 'none';
        startCountdown();
      }, 1200);
    }, 1060);
  });

  /* ============================================================
     SPARKLES
     ============================================================ */
  function spawnSparkles() {
    const cx = window.innerWidth  / 2;
    const cy = window.innerHeight / 2;
    const palette = ['#fde68a','#ffffff','#f9a8d4','#fff3c4','#c084fc','#fbbf24'];
    for (let i = 0; i < 24; i++) {
      const p = document.createElement('div');
      p.className = 'sparkle';
      const angle = (i / 24) * Math.PI * 2 + Math.random() * 0.4;
      const dist  = 70 + Math.random() * 170;
      p.style.setProperty('--tx', Math.cos(angle) * dist + 'px');
      p.style.setProperty('--ty', Math.sin(angle) * dist + 'px');
      p.style.left = cx + 'px';
      p.style.top  = cy + 'px';
      const sz = 3 + Math.random() * 5;
      p.style.width  = sz + 'px';
      p.style.height = sz + 'px';
      p.style.background = palette[Math.floor(Math.random() * palette.length)];
      p.style.animationDelay = (Math.random() * 0.08) + 's';
      document.body.appendChild(p);
      setTimeout(() => p.remove(), 1300);
    }
  }

  /* ============================================================
     COUNTDOWN
     ============================================================ */
  function startCountdown() {
    const cdOverlay = document.getElementById('cd-overlay');
    const cdText    = document.getElementById('cd-text');
    const flashEl   = document.getElementById('flash');

    const steps = [
      { text:'3',        cls:'num',     dur:950  },
      { text:'2',        cls:'num',     dur:950  },
      { text:'1',        cls:'num',     dur:950  },
      { text:'HAPPY',    cls:'word',    dur:1100 },
      { text:'BIRTHDAY', cls:'word',    dur:1100 },
      { text:'TO',       cls:'word',    dur:1100 },
      { text:'KÁ',       cls:'name ka', dur:2200 },
    ];

    cdOverlay.style.opacity = '1';
    let i = 0, done = false;

    if (localStorage.getItem('visited')) { skipHint.style.opacity = '1'; }

    function finish() {
      if (done) return;
      done = true;
      skipHint.style.opacity = '0';
      cdOverlay.style.transition = 'opacity 0.5s';
      cdOverlay.style.opacity    = '0';
      setTimeout(() => navigateTo('candle.html'), 550);
    }

    function next() {
      if (done) return;
      if (i >= steps.length) { finish(); return; }
      const { text, cls, dur } = steps[i++];
      cdText.className    = cls;
      cdText.textContent  = text;
      cdText.classList.remove('cd-anim');
      void cdText.offsetWidth;
      cdText.classList.add('cd-anim');

      if (cls.includes('ka')) {
        flashEl.classList.remove('burst');
        void flashEl.offsetWidth;
        flashEl.classList.add('burst');
        setTimeout(spawnSparkles, 50);
      }
      setTimeout(next, dur);
    }

    next();

    const onKey = (e) => { if (e.code === 'Space') { e.preventDefault(); removeH(); finish(); } };
    let lastTap = 0;
    const onTap = () => { const n = Date.now(); if (n - lastTap < 350) { removeH(); finish(); } lastTap = n; };
    function removeH() { document.removeEventListener('keydown', onKey); document.removeEventListener('pointerdown', onTap); }
    document.addEventListener('keydown', onKey);
    document.addEventListener('pointerdown', onTap);
  }
</script>
</body>
</html>
