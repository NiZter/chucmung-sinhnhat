<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Falling Rain ♥</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Montserrat:wght@900&display=swap" rel="stylesheet">
  <link rel="preload" href="data/sticker.gif" as="image">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100vh;
      height: 100dvh;
      overflow: hidden;
      background: #000;
      font-family: monospace;
    }

    /* =====================================================
       GIFT INTRO OVERLAY
       ===================================================== */
    #gift-intro {
      position: fixed; inset: 0; z-index: 1001;
      background: radial-gradient(ellipse at 50% 42%, #1c0a2e 0%, #0e0018 58%, #060008 100%);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      transition: opacity 1.1s ease;
    }
    #gift-intro.gi-hide { opacity: 0; pointer-events: none; }

    /* Stars canvas inside intro */
    #gi-stars {
      position: absolute; inset: 0; pointer-events: none;
    }

    /* Spotlight cone shining down on the gift box */
    #gi-spotlight {
      position: absolute;
      top: -10%; left: 50%;
      transform: translateX(-50%);
      width: 100%; max-width: 720px; height: 95%;
      background: linear-gradient(180deg,
        rgba(255,220,140,0.20) 0%,
        rgba(245,180,80,0.13)  25%,
        rgba(220,120,200,0.07) 55%,
        transparent 88%);
      clip-path: polygon(42% 0%, 58% 0%, 90% 100%, 10% 100%);
      filter: blur(3px);
      pointer-events: none;
      z-index: 1;
      animation: spotlight-sway 7s ease-in-out infinite;
      mix-blend-mode: screen;
    }
    @keyframes spotlight-sway {
      0%, 100% { transform: translateX(-50%) skewX(0deg); }
      50%       { transform: translateX(-50%) skewX(-2.5deg); }
    }

    /* Orbiting aura sparkles around the gift box */
    #gi-aura {
      position: absolute;
      top: 50%; left: 50%;
      width: 0; height: 0;
      pointer-events: none;
      z-index: 0; /* behind the gift image (which has higher stacking) */
    }
    .aura-sparkle {
      position: absolute;
      left: 0; top: 0;
      width: 7px; height: 7px;
      margin-left: -3.5px; margin-top: -3.5px;
      border-radius: 50%;
      background: radial-gradient(circle, #fff8c0 10%, #ffb060 50%, transparent 80%);
      box-shadow: 0 0 10px rgba(255,200,100,0.9);
      animation: aura-orbit 7s linear infinite, aura-pulse 1.7s ease-in-out infinite;
      animation-delay: var(--del, 0s), var(--del, 0s);
    }
    @keyframes aura-orbit {
      from { transform: rotate(0deg)   translateX(var(--r, 170px)); }
      to   { transform: rotate(360deg) translateX(var(--r, 170px)); }
    }
    @keyframes aura-pulse {
      0%, 100% { opacity: 0.45; }
      50%       { opacity: 1; }
    }

    /* Box outer wrapper — handles float + shake */
    #box-wrap {
      position: relative; z-index: 2;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    #box-wrap.floating { animation: box-float 3s ease-in-out infinite; }
    @keyframes box-float {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-14px); }
    }
    #box-wrap.shake { animation: box-shake 0.44s ease both !important; }
    @keyframes box-shake {
      0%  { transform: translateX(0) rotate(0); }
      10% { transform: translateX(-10px) rotate(-4deg); }
      22% { transform: translateX(10px) rotate(4deg); }
      34% { transform: translateX(-8px) rotate(-3deg); }
      46% { transform: translateX(8px) rotate(3deg); }
      58% { transform: translateX(-5px) rotate(-1.5deg); }
      70% { transform: translateX(5px) rotate(1.5deg); }
      82% { transform: translateX(-2px) rotate(-0.5deg); }
      100%{ transform: translateX(0) rotate(0); }
    }

    /* Gift images */
    #gift-img-wrap {
      position: relative;
      width: clamp(200px, 44vmin, 320px);
      filter: drop-shadow(0 24px 50px rgba(0,0,0,0.55));
    }
    #gift-closed, #gift-open {
      width: 100%; height: auto; display: block;
      user-select: none; pointer-events: none;
      -webkit-user-drag: none;
    }
    #gift-open {
      position: absolute; top: 0; left: 0;
      opacity: 0; transition: opacity 0.3s ease;
    }
    #gift-closed { transition: opacity 0.2s ease; }

    /* Swap: show open, hide closed + pop scale */
    #gift-img-wrap.opened #gift-open   { opacity: 1; }
    #gift-img-wrap.opened #gift-closed { opacity: 0; }
    #gift-img-wrap.opened {
      animation: gift-pop 0.45s cubic-bezier(0.34,1.56,0.64,1) both;
    }
    @keyframes gift-pop {
      0%   { transform: scale(1); }
      45%  { transform: scale(1.13); }
      100% { transform: scale(1); }
    }

    /* Hint text — festive gradient with sparkle */
    #gift-hint {
      position: relative; z-index: 2;
      margin-top: 38px;
      font-family: 'Dancing Script', cursive;
      font-weight: 700;
      font-size: clamp(15px,3.8vw,21px);
      letter-spacing: 0.4px;
      background: linear-gradient(110deg,
        #fde68a 0%, #ffc1e3 28%, #d8b4fe 55%, #ffc1e3 78%, #fde68a 100%);
      background-size: 220% 100%;
      -webkit-background-clip: text; background-clip: text;
      -webkit-text-fill-color: transparent;
      filter: drop-shadow(0 0 10px rgba(245,158,11,0.45)) drop-shadow(0 0 22px rgba(216,180,254,0.32));
      animation: hint-pulse 2.3s ease-in-out infinite, hint-shimmer 4.5s linear infinite;
      pointer-events: none; user-select: none;
    }
    @keyframes hint-pulse {
      0%,100% { opacity:0.85; transform:translateY(0); }
      50%     { opacity:1;    transform:translateY(-3px); }
    }
    @keyframes hint-shimmer {
      0%   { background-position: 0% 50%; }
      100% { background-position: 220% 50%; }
    }
    #gift-hint.gone { opacity:0; transition:opacity 0.3s; }

    /* Pulse ring under the gift box for a festive halo */
    #box-wrap::before {
      content: '';
      position: absolute; left: 50%; top: 50%;
      width: clamp(220px, 50vmin, 360px);
      height: clamp(220px, 50vmin, 360px);
      transform: translate(-50%,-50%);
      border-radius: 50%;
      background: radial-gradient(circle,
        rgba(255,200,120,0.22) 0%,
        rgba(245,158,11,0.10) 32%,
        transparent 70%);
      filter: blur(8px);
      pointer-events: none;
      z-index: -1;
      animation: halo-breathe 3.8s ease-in-out infinite;
    }
    @keyframes halo-breathe {
      0%,100% { transform: translate(-50%,-50%) scale(1);    opacity: 0.85; }
      50%      { transform: translate(-50%,-50%) scale(1.15); opacity: 1;    }
    }

    /* =====================================================
       FLOWER LAYER
       ===================================================== */
    #flower-layer {
      position: fixed; inset: 0; overflow: hidden;
      pointer-events: none; z-index: 1003;
    }
    /* Flower rain */
    .fl-rain {
      position: fixed;
      pointer-events: none;
      user-select: none;
      width: var(--fs);
      height: auto;
      left: var(--lx);
      top: -80px;
      will-change: transform, opacity;
      animation: fl-fall var(--dur) linear var(--del) forwards;
    }
    @keyframes fl-fall {
      0%   { transform: translateY(0)     translateX(0)         rotate(0deg)        scale(1);        opacity: 0; }
      6%   { opacity: 1; }
      88%  { opacity: 0.92; }
      100% { transform: translateY(118vh) translateX(var(--dx)) rotate(var(--rot))   scale(var(--sc)); opacity: 0; }
    }

    /* Background mixed rain (text + flower images + emoji) */
    .bg-item {
      position: absolute;
      pointer-events: none; user-select: none;
      left: var(--lx); top: -130px;
      will-change: transform, opacity;
      animation: bg-fall var(--dur) linear var(--del) forwards;
      opacity: 0;
    }
    @keyframes bg-fall {
      0%   { transform: translateZ(var(--z)) translateY(0)      translateX(0)         rotate(0deg)      scale(1);        opacity: 0; }
      7%   { opacity: var(--op); }
      85%  { opacity: var(--op); }
      100% { transform: translateZ(var(--z)) translateY(120vh) translateX(var(--dx)) rotate(var(--rot)) scale(var(--sc)); opacity: 0; }
    }
    .bg-text {
      font-family: 'Dancing Script', cursive;
      font-weight: 700;
      font-size: var(--fs);
      color: var(--col);
      white-space: nowrap;
      text-shadow: 0 0 7px var(--glow), 0 0 20px var(--glow), 0 0 42px var(--glow2);
    }
    .bg-emoji {
      font-size: var(--fs);
      display: block;
      filter: drop-shadow(0 0 8px var(--glow)) drop-shadow(0 0 18px var(--glow2));
    }
    .bg-item img {
      width: var(--fs); height: auto; display: block;
      filter: drop-shadow(0 0 10px var(--glow)) drop-shadow(0 0 22px var(--glow2));
    }

    /* =====================================================
       RAIN — 3-D scene
       ===================================================== */
    #rain-wrap {
      position: fixed; inset: 0;
      background: #000; overflow: hidden;
      perspective: 750px;
      perspective-origin: 50% 50%;
      touch-action: none;            /* prevent iOS pull-to-refresh during drag */
      overscroll-behavior: none;
    }
    #rain-scene {
      width: 100%; height: 100%;
      transform-style: preserve-3d;
      transform: rotateX(0deg) rotateY(0deg);
    }

    /* =====================================================
       FLASH (KÁ reveal)
       ===================================================== */
    #flash {
      position: fixed; inset: 0;
      background: rgba(255,235,180,0.88);
      opacity: 0; pointer-events: none; z-index: 9;
    }
    #flash.burst { animation: flash-burst 0.6s ease-out forwards; }
    @keyframes flash-burst {
      0%   { opacity: 0.55; }
      100% { opacity: 0; }
    }

    /* =====================================================
       SPARKLES
       ===================================================== */
    .sparkle {
      position: fixed; border-radius: 50%;
      pointer-events: none; z-index: 7;          /* below #cd-overlay so KÁ stays on top */
      transform: translate(-50%, -50%);
      animation: sparkle-fly 1.1s ease-out forwards;
    }
    @keyframes sparkle-fly {
      0%   { opacity: 1; transform: translate(-50%,-50%) translate(0,0) scale(1); }
      100% { opacity: 0; transform: translate(-50%,-50%) translate(var(--tx),var(--ty)) scale(0.2); }
    }

    /* =====================================================
       COUNTDOWN
       ===================================================== */
    #cd-overlay {
      position: fixed; inset: 0; z-index: 8;
      display: flex; align-items: center; justify-content: center;
      pointer-events: none; opacity: 0;
    }
    #cd-text {
      color: #fff; text-align: center; line-height: 1.15;
      text-shadow: 0 2px 60px rgba(0,0,0,0.8), 0 0 18px rgba(180,100,255,0.18);
      white-space: pre-line;
    }
    #cd-text.num {
      font-family: 'Montserrat', sans-serif; font-weight: 900;
      font-size: clamp(80px,20vw,220px); letter-spacing: 0px;
      background: linear-gradient(180deg,
        #ffffff 0%, #fde68a 45%, #f9a8d4 90%);
      -webkit-background-clip: text; background-clip: text;
      -webkit-text-fill-color: transparent;
      filter: drop-shadow(0 0 30px rgba(245,158,11,0.55)) drop-shadow(0 4px 20px rgba(216,180,254,0.45));
    }
    #cd-text.word {
      font-family: 'Montserrat', sans-serif; font-weight: 900;
      font-size: clamp(26px,7vw,82px); letter-spacing: clamp(8px,2vw,18px);
      background: linear-gradient(110deg,
        #fde68a 0%, #ffffff 30%, #f9a8d4 55%, #c084fc 80%, #fde68a 100%);
      background-size: 220% 100%;
      -webkit-background-clip: text; background-clip: text;
      -webkit-text-fill-color: transparent;
      filter: drop-shadow(0 0 24px rgba(216,180,254,0.55));
      animation: word-shimmer 2.2s linear infinite;
    }
    @keyframes word-shimmer {
      0%   { background-position: 0% 50%; }
      100% { background-position: 220% 50%; }
    }
    #cd-text.name {
      font-family: 'Montserrat', sans-serif; font-weight: 900;
      font-size: clamp(52px,14vw,150px); letter-spacing: 16px;
    }
    #cd-text.ka {
      background: linear-gradient(110deg,
        #fde68a 0%, #ffffff 22%, #fff7d0 38%,
        #ffffff 50%, #fff7d0 62%, #f59e0b 80%, #fde68a 100%);
      background-size: 300% 100%;
      -webkit-background-clip: text; background-clip: text;
      -webkit-text-fill-color: transparent; text-shadow: none;
      filter: drop-shadow(0 0 22px rgba(245,158,11,0.62));
    }
    #cd-text.ka.cd-anim {
      animation:
        ka-reveal 2.2s cubic-bezier(0.4,0,0.2,1) forwards,
        ka-shimmer 2.2s linear infinite !important;
    }
    @keyframes ka-shimmer {
      0%   { background-position: 200% 50%; }
      100% { background-position: -100% 50%; }
    }

    /* Firework canvas — fullscreen, transparent, sits between flash & cd-overlay */
    #firework-canvas {
      position: fixed; inset: 0;
      z-index: 7;
      pointer-events: none;
      mix-blend-mode: screen;
    }
    @keyframes ka-reveal {
      0%   { opacity:0; letter-spacing:52px; transform:scale(1.7);  filter:blur(10px) drop-shadow(0 0 8px rgba(245,158,11,0.25)); }
      22%  { opacity:1; letter-spacing:16px; transform:scale(1);    filter:blur(0)    drop-shadow(0 0 22px rgba(245,158,11,0.62)); }
      75%  { opacity:1; letter-spacing:16px; transform:scale(1);    filter:           drop-shadow(0 0 22px rgba(245,158,11,0.62)); }
      100% { opacity:0; letter-spacing:16px; transform:scale(0.92); filter:blur(4px)  drop-shadow(0 0 4px rgba(245,158,11,0)); }
    }
    @keyframes cd-flash {
      0%   { opacity:0; transform:scale(2.0); filter:blur(6px); }
      18%  { opacity:1; transform:scale(1);   filter:blur(0); }
      72%  { opacity:1; transform:scale(1);   filter:blur(0); }
      100% { opacity:0; transform:scale(0.75); filter:blur(4px); }
    }
    .cd-anim { animation: cd-flash 1s cubic-bezier(0.4,0,0.2,1) forwards; }


    /* =====================================================
       UI BUTTONS
       ===================================================== */
    #play-btn {
      position:fixed; bottom:20px; left:50%;
      transform:translateX(-50%);
      z-index:200; display:none;
      align-items:center; gap:7px;
      background:linear-gradient(120deg,
        rgba(245,158,11,0.28) 0%,
        rgba(236,72,153,0.22) 50%,
        rgba(192,132,252,0.26) 100%);
      border:1px solid rgba(253,230,138,0.55);
      border-radius:22px; padding:9px 22px;
      color:#fff4d0; font-size:13px; font-weight:600; cursor:pointer;
      letter-spacing:0.4px;
      backdrop-filter:blur(12px); white-space:nowrap;
      box-shadow: 0 4px 18px rgba(245,158,11,0.25), inset 0 1px 0 rgba(255,255,255,0.18);
      animation:play-pulse 2s ease-in-out infinite;
      transition: transform 0.18s ease, box-shadow 0.18s ease;
    }
    #play-btn:hover { transform:translateX(-50%) translateY(-2px); box-shadow:0 8px 24px rgba(245,158,11,0.4); }
    @keyframes play-pulse {
      0%,100% { box-shadow:0 4px 18px rgba(245,158,11,0.25), 0 0 0 0 rgba(245,158,11,0.45), inset 0 1px 0 rgba(255,255,255,0.18); }
      50%     { box-shadow:0 4px 18px rgba(245,158,11,0.25), 0 0 0 14px rgba(245,158,11,0),    inset 0 1px 0 rgba(255,255,255,0.18); }
    }
    #nav-overlay {
      position:fixed; inset:0; background:#000;
      z-index:9999; opacity:0;
      transition:opacity 0.42s ease;
      pointer-events:none;
    }
    #skip-hint {
      position:fixed; bottom:18px; left:50%;
      transform:translateX(-50%);
      font-family:'Dancing Script', cursive;
      font-size:14px; letter-spacing:0.6px;
      color:rgba(240,220,255,0.72);
      text-shadow:0 0 12px rgba(192,132,252,0.35);
      z-index:10; pointer-events:none;
      opacity:0; transition:opacity 0.5s;
      white-space:nowrap;
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration:0.01ms !important;
        animation-iteration-count:1 !important;
        transition-duration:0.01ms !important;
      }
    }
    @supports (padding: env(safe-area-inset-top)) {
      #play-btn  { bottom:max(20px,calc(env(safe-area-inset-bottom)+14px)); }
      #skip-hint { bottom:max(16px,calc(env(safe-area-inset-bottom)+10px)); }
    }
  </style>
</head>
<body>

<!-- ===== GIFT INTRO OVERLAY ===== -->
<div id="gift-intro">
  <canvas id="gi-stars"></canvas>
  <div id="gi-spotlight"></div>
  <div id="box-wrap">
    <div id="gi-aura"></div>
    <div id="gift-img-wrap">
      <img id="gift-closed" src="data/model_gift.png"      alt="Hộp quà" draggable="false">
      <img id="gift-open"   src="data/model_gift_open.png" alt=""        draggable="false">
    </div>
  </div>
  <p id="gift-hint">Chạm để mở quà 🎁</p>
</div>

<!-- ===== FLOWER LAYER ===== -->
<div id="flower-layer"></div>

<!-- ===== EXISTING CONTENT ===== -->
<div id="rain-wrap"><div id="rain-scene"></div></div>
<audio id="bg-music" src="data/music_2.mp3" loop></audio>
<div id="flash"></div>
<canvas id="firework-canvas"></canvas>
<div id="nav-overlay"></div>
<button id="play-btn" aria-label="Bật nhạc">▶ Bật nhạc</button>
<div id="skip-hint">Nhấn Space hoặc chạm 2 lần để bỏ qua</div>

<div id="cd-overlay"><span id="cd-text"></span></div>


<script>
  /* ============================================================
     GIFT INTRO — STARS BACKGROUND
     ============================================================ */
  (function () {
    const cv  = document.getElementById('gi-stars');
    const ctx = cv.getContext('2d');
    let stars = [];
    let raf;

    function resize() {
      cv.width  = window.innerWidth;
      cv.height = window.innerHeight;
      stars = Array.from({ length: 200 }, () => ({
        x: Math.random() * cv.width,
        y: Math.random() * cv.height,
        r: Math.random() * 1.2 + 0.2,
        a: Math.random()
      }));
    }
    function draw() {
      ctx.clearRect(0, 0, cv.width, cv.height);
      stars.forEach(s => {
        s.a += (Math.random() - 0.5) * 0.025;
        s.a = Math.max(0.08, Math.min(1, s.a));
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255,255,255,${s.a})`;
        ctx.fill();
      });
      raf = requestAnimationFrame(draw);
    }
    resize();
    draw();
    window.addEventListener('resize', resize);
    // Expose stop so we can cancel after intro
    window._stopGiStars = () => cancelAnimationFrame(raf);
  })();

  /* ============================================================
     GIFT INTRO — BOX INTERACTION
     ============================================================ */
  const boxWrap      = document.getElementById('box-wrap');
  const giftImgWrap  = document.getElementById('gift-img-wrap');
  const giftHint     = document.getElementById('gift-hint');
  const giftIntro  = document.getElementById('gift-intro');
  const flowerLayer= document.getElementById('flower-layer');
  const music      = document.getElementById('bg-music');

  const FLOWERS = [
    'data/hoa1.png','data/hoa2.png','data/hoa3.webp','data/hoa4.png',
    'data/hoa1.png','data/hoa3.webp','data/hoa2.png','data/hoa4.png',
    'data/hoa1.png','data/hoa2.png',
  ];
  const FLOWERS_RAIN = [
    'data/hoa1.png','data/hoa2.png','data/hoa3.webp','data/hoa4.png',
    'data/hoa1.png','data/hoa3.webp','data/hoa4.png','data/hoa2.png',
  ];

  const WISHES = [
    'Chúc mừng sinh nhật 🎂',
    'Happy Birthday 🎉',
    'Sinh nhật vui vẻ!',
    'Tuổi mới bình an 🌸',
    'Vạn sự như ý ✨',
    'Hạnh phúc mãi mãi 💕',
    'Thật nhiều niềm vui',
    'Sức khỏe dồi dào 🍀',
    'Ước mơ thành hiện thực',
    '🎈 Chúc mừng 🎈',
    'Luôn tươi trẻ 🌺',
    'Một tuổi mới tuyệt vời',
    'Ngày mới rực rỡ ☀️',
    'Yêu đời yêu người 💖',
  ];
  const BG_EMOJIS = ['❤️','🩷','💕','💗','💖','💝','✨','🌸','🎀','🎊','🎉','⭐','🌟','💫','🍀','🌈'];
  const BG_COLORS = [
    { col:'#ff9ecd', glow:'#ff3090', glow2:'rgba(255,48,144,0.22)'  },
    { col:'#fde68a', glow:'#f59e0b', glow2:'rgba(245,158,11,0.22)'  },
    { col:'#ffffff', glow:'#c084fc', glow2:'rgba(192,132,252,0.22)' },
    { col:'#f9a8d4', glow:'#ec4899', glow2:'rgba(236,72,153,0.22)'  },
    { col:'#d8b4fe', glow:'#9333ea', glow2:'rgba(147,51,234,0.22)'  },
    { col:'#fbbf24', glow:'#f59e0b', glow2:'rgba(251,191,36,0.22)'  },
    { col:'#86efac', glow:'#22c55e', glow2:'rgba(34,197,94,0.22)'   },
    { col:'#67e8f9', glow:'#06b6d4', glow2:'rgba(6,182,212,0.22)'   },
    { col:'#ff6b9d', glow:'#ff1a6e', glow2:'rgba(255,26,110,0.22)'  },
  ];

  // Start float animation
  boxWrap.classList.add('floating');

  // Spawn orbiting aura sparkles around the gift box
  (function spawnAura() {
    const aura = document.getElementById('gi-aura');
    if (!aura) return;
    const COUNT = 10;
    const DUR   = 7; // matches CSS aura-orbit duration
    for (let i = 0; i < COUNT; i++) {
      const sp = document.createElement('div');
      sp.className = 'aura-sparkle';
      // Negative delay distributes them evenly around the orbit
      const del = -(i / COUNT) * DUR;
      sp.style.setProperty('--del', del.toFixed(2) + 's');
      // Slight radius variation for organic feel
      const r = 150 + (i % 3) * 18 + Math.random() * 10;
      sp.style.setProperty('--r', r.toFixed(0) + 'px');
      // Vary size a touch
      const sz = 5 + Math.random() * 4;
      sp.style.width  = sz + 'px';
      sp.style.height = sz + 'px';
      sp.style.marginLeft = (-sz/2) + 'px';
      sp.style.marginTop  = (-sz/2) + 'px';
      aura.appendChild(sp);
    }
  })();

  let boxOpened = false;

  function spawnBurstFlowers() {
    // Origin = nắp hộp (top ~20% of box image)
    const rect = boxWrap.getBoundingClientRect();
    const cx   = rect.left + rect.width  / 2;
    const cy   = rect.top  + rect.height * 0.22;

    const COUNT = 72;
    for (let i = 0; i < COUNT; i++) {
      // Fountain: phun lên như đài phun nước, góc từ ~-160° đến ~-20° (quạt hướng lên)
      const ang = -Math.PI / 2 + (Math.random() - 0.5) * Math.PI * 0.9;
      const spd = 0.35 + Math.random() * 0.65;
      const maxR = Math.min(window.innerWidth, window.innerHeight) * (0.45 + spd * 0.45);
      const dx  = Math.cos(ang) * maxR;
      const dy  = Math.sin(ang) * maxR;
      const fs  = 60 + Math.random() * 80;
      const rot = (Math.random() - 0.5) * 720;
      const dur = 0.9 + Math.random() * 0.9;
      const del = Math.random() * 0.18;

      const el  = document.createElement('img');
      el.src = FLOWERS[Math.floor(Math.random() * FLOWERS.length)];
      el.style.cssText =
        `position:fixed;left:${cx}px;top:${cy}px;width:${fs}px;height:auto;` +
        `pointer-events:none;will-change:transform,opacity;user-select:none;`;
      flowerLayer.appendChild(el);

      el.animate([
        { transform:'translate(-50%,-50%) scale(0.2) rotate(0deg)', opacity:0 },
        { transform:`translate(calc(-50% + ${dx*0.18}px),calc(-50% + ${dy*0.18}px)) scale(1.3) rotate(${rot*0.2}deg)`, opacity:1, offset:0.18 },
        { transform:`translate(calc(-50% + ${dx*0.7}px),calc(-50% + ${dy*0.7}px)) scale(1.0) rotate(${rot*0.7}deg)`, opacity:0.95, offset:0.7 },
        { transform:`translate(calc(-50% + ${dx}px),calc(-50% + ${dy}px)) scale(0.65) rotate(${rot}deg)`, opacity:0 }
      ], {
        duration : dur * 1000,
        delay    : del * 1000,
        fill     : 'forwards',
        easing   : 'cubic-bezier(0.2,0.8,0.35,1)'
      });

      setTimeout(() => el.remove(), (dur + del + 0.15) * 1000);
    }
  }

  let rainInterval = null;
  let rainCount    = 0;

  function startFlowerRain() {
    const MAX = 220;
    rainInterval = setInterval(() => {
      if (rainCount >= MAX) { clearInterval(rainInterval); return; }
      const batch = 6 + Math.floor(Math.random() * 5);
      for (let i = 0; i < batch; i++) {
        const el  = document.createElement('img');
        el.className = 'fl-rain';
        el.src = FLOWERS_RAIN[Math.floor(Math.random() * FLOWERS_RAIN.length)];
        const fs  = 100 + Math.random() * 100;
        const lx  = (Math.random() * 110 - 5) + 'vw';
        const dx  = (Math.random() - 0.5) * 120;
        const rot = (Math.random() - 0.5) * 540;
        const sc  = 0.65 + Math.random() * 0.8;
        const dur = 3.2 + Math.random() * 2.4;
        const del = Math.random() * 0.6;
        el.style.setProperty('--fs',  fs  + 'px');
        el.style.setProperty('--lx',  lx);
        el.style.setProperty('--dx',  dx  + 'px');
        el.style.setProperty('--rot', rot + 'deg');
        el.style.setProperty('--sc',  sc  + '');
        el.style.setProperty('--dur', dur + 's');
        el.style.setProperty('--del', del + 's');
        flowerLayer.appendChild(el);
        setTimeout(() => el.remove(), (dur + del + 0.2) * 1000);
      }
      rainCount += batch;
    }, 75);
  }

  function runGiftSequence() {
    if (boxOpened) return;
    boxOpened = true;

    // Hide hint
    giftHint.classList.add('gone');

    // Start music
    music.volume = 0.65;
    music.play().catch(() => {
      document.getElementById('play-btn').style.display = 'flex';
    });

    // Phase 1 — shake (0-440ms)
    boxWrap.classList.remove('floating');
    boxWrap.classList.add('shake');

    // Phase 2 — swap to open image (440ms)
    setTimeout(() => {
      giftImgWrap.classList.add('opened');

      // Phase 3 — burst flowers (640ms)
      setTimeout(spawnBurstFlowers, 200);

      // Phase 4 — rain starts (1300ms after click)
      setTimeout(startFlowerRain, 860);

      // Phase 5 — begin fade-out (4200ms after click)
      setTimeout(() => {
        giftIntro.classList.add('gi-hide');
        // After fade completes, remove DOM + stop stars, then start countdown
        setTimeout(() => {
          giftIntro.remove();
          flowerLayer.remove();
          window._stopGiStars && window._stopGiStars();
          startCountdown();
        }, 1100);
      }, 4200);

    }, 440);
  }

  // Click / tap on box
  boxWrap.addEventListener('pointerdown', (e) => {
    e.preventDefault();
    runGiftSequence();
  });

  /* ============================================================
     BACKGROUND MIXED RAIN  (text + flower images + emoji)
     ============================================================ */
  (function startBgRain() {
    const scene3d = document.getElementById('rain-scene');

    function spawnRainItem() {
      const clr  = BG_COLORS[Math.floor(Math.random() * BG_COLORS.length)];
      const lx   = (Math.random() * 105 - 3) + 'vw';
      const dx   = (Math.random() - 0.5) * 100;
      const rot  = (Math.random() - 0.5) * 30;
      const sc   = 0.75 + Math.random() * 0.5;
      const dur  = 5.5 + Math.random() * 5;
      const del  = Math.random() * 0.5;
      /* depth: -500 (far/small) to +320 (near/large) */
      const z    = -500 + Math.random() * 820;
      /* depth fog: farther items slightly more transparent */
      const depthFade = (z + 500) / 820;          // 0‥1
      const rng  = Math.random();

      const el = document.createElement('div');
      el.className = 'bg-item';

      if (rng < 0.50) {
        /* ── wish text ── */
        el.classList.add('bg-text');
        el.textContent = WISHES[Math.floor(Math.random() * WISHES.length)];
        el.style.setProperty('--fs',  (13 + Math.random() * 13) + 'px');
        el.style.setProperty('--col', clr.col);
        el.style.setProperty('--op',  (0.55 + depthFade * 0.35).toFixed(2));
      } else if (rng < 0.78) {
        /* ── meme image ── */
        const MEMES = ['data/meme1.jpg','data/meme2.jpg','data/meme3.jpg','data/meme4.jpg','data/meme5.jpg'];
        const img = document.createElement('img');
        img.src = MEMES[Math.floor(Math.random() * MEMES.length)];
        img.draggable = false;
        img.style.borderRadius = '12px';
        el.appendChild(img);
        el.style.setProperty('--fs', (70 + Math.random() * 80) + 'px');
        el.style.setProperty('--op', (0.55 + depthFade * 0.35).toFixed(2));
      } else {
        /* ── emoji ── */
        el.classList.add('bg-emoji');
        el.textContent = BG_EMOJIS[Math.floor(Math.random() * BG_EMOJIS.length)];
        el.style.setProperty('--fs', (18 + Math.random() * 28) + 'px');
        el.style.setProperty('--op', (0.45 + depthFade * 0.35).toFixed(2));
      }

      el.style.setProperty('--z',    z   + 'px');
      el.style.setProperty('--lx',   lx);
      el.style.setProperty('--dx',   dx  + 'px');
      el.style.setProperty('--rot',  rot + 'deg');
      el.style.setProperty('--sc',   sc  + '');
      el.style.setProperty('--dur',  dur + 's');
      el.style.setProperty('--del',  del + 's');
      el.style.setProperty('--glow',  clr.glow);
      el.style.setProperty('--glow2', clr.glow2);
      scene3d.appendChild(el);
      setTimeout(() => el.remove(), (dur + del + 0.3) * 1000);
    }

    const rainIv = setInterval(spawnRainItem, 180);
    /* expose so navigateTo() can stop spawning before unload */
    window._stopBgRain = () => clearInterval(rainIv);
  })();

  /* ============================================================
     3-D RAIN DRAG — rotate scene on mouse / touch
     ============================================================ */
  (function initRainDrag() {
    const rainScene = document.getElementById('rain-scene');
    let rotX = 0, rotY = 0;
    let dragging = false, startX = 0, startY = 0;
    let velX = 0, velY = 0;
    let hasMoved = false;
    let rafId = null;
    const MAX = 65, SENS = 0.22, FRICTION = 0.90, THRESHOLD = 5;

    function applyRot() {
      rainScene.style.transform = `rotateX(${rotX}deg) rotateY(${rotY}deg)`;
    }
    function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }

    function onStart(x, y) {
      dragging  = true; hasMoved = false;
      startX = x; startY = y;
      velX = velY = 0;
      cancelAnimationFrame(rafId);
    }
    function onMove(x, y) {
      if (!dragging) return;
      const dx = x - startX, dy = y - startY;
      if (!hasMoved && Math.hypot(dx, dy) < THRESHOLD) return;
      hasMoved = true;
      velX = dx * SENS; velY = dy * SENS;
      rotY = clamp(rotY + velX, -MAX, MAX);
      rotX = clamp(rotX - velY, -MAX, MAX);
      applyRot();
      startX = x; startY = y;
    }
    function onEnd() {
      if (!dragging) return;
      dragging = false;
      function glide() {
        velX *= FRICTION; velY *= FRICTION;
        if (Math.abs(velX) < 0.04 && Math.abs(velY) < 0.04) return;
        rotY = clamp(rotY + velX, -MAX, MAX);
        rotX = clamp(rotX - velY, -MAX, MAX);
        applyRot();
        rafId = requestAnimationFrame(glide);
      }
      glide();
    }

    /* mouse */
    document.addEventListener('mousedown',  e => { if (!e.target.closest('#box-wrap')) onStart(e.clientX, e.clientY); });
    document.addEventListener('mousemove',  e => onMove(e.clientX, e.clientY));
    document.addEventListener('mouseup',    onEnd);
    document.addEventListener('mouseleave', onEnd);
    /* touch */
    document.addEventListener('touchstart', e => {
      if (e.target.closest('#box-wrap')) return;
      const t = e.touches[0]; onStart(t.clientX, t.clientY);
    }, { passive:true });
    document.addEventListener('touchmove',  e => { const t = e.touches[0]; onMove(t.clientX, t.clientY); },  { passive:true });
    document.addEventListener('touchend',   onEnd);
  })();

  /* ============================================================
     SHARED HELPERS
     ============================================================ */
  const navOvl   = document.getElementById('nav-overlay');
  const playBtn  = document.getElementById('play-btn');
  const skipHint = document.getElementById('skip-hint');

  // Music play button (fallback)
  playBtn.addEventListener('click', () => {
    music.play().catch(() => {});
    playBtn.style.display = 'none';
  });

  function navigateTo(href) {
    /* stop background rain spawner so it doesn't leak into the next page */
    if (window._stopBgRain) window._stopBgRain();

    navOvl.style.pointerEvents = 'all';
    navOvl.style.opacity = '1';
    const origVol = music.volume;
    let step = 0;
    const iv = setInterval(() => {
      step++;
      music.volume = Math.max(0, origVol * (1 - step / 20));
      if (step >= 20) {
        clearInterval(iv);
        sessionStorage.setItem('musicTime',
          music.readyState >= 2 ? music.currentTime
            : parseFloat(sessionStorage.getItem('musicTime') || '0'));
        window.location.href = href;
      }
    }, 20);
  }

  /* ============================================================
     FIREWORKS — canvas particles, explode + gravity + fade
     ============================================================ */
  const fwCanvas = document.getElementById('firework-canvas');
  const fwCtx    = fwCanvas.getContext('2d');
  let fwParticles = [];
  let fwRaf = null;

  function fwResize() {
    fwCanvas.width  = window.innerWidth;
    fwCanvas.height = window.innerHeight;
  }
  fwResize();
  window.addEventListener('resize', fwResize);

  const FW_PALETTE = [
    [255, 200, 80],   [255, 150, 200], [180, 120, 255],
    [120, 200, 255], [255, 220, 140], [255, 110, 160],
    [140, 240, 200], [255, 240, 200],
  ];

  function spawnFirework(x, y, color, count = 70) {
    const [r, g, b] = color || FW_PALETTE[Math.floor(Math.random() * FW_PALETTE.length)];
    for (let i = 0; i < count; i++) {
      const ang = (i / count) * Math.PI * 2 + Math.random() * 0.18;
      const v   = 2.4 + Math.random() * 4.2;
      fwParticles.push({
        x, y,
        vx: Math.cos(ang) * v,
        vy: Math.sin(ang) * v,
        life: 1,
        size: 1.8 + Math.random() * 1.6,
        r, g, b,
      });
    }
    if (!fwRaf) fwRaf = requestAnimationFrame(fwAnimate);
  }

  function fwAnimate() {
    // Trail effect — partial clear
    fwCtx.fillStyle = 'rgba(0,0,0,0.18)';
    fwCtx.globalCompositeOperation = 'destination-out';
    fwCtx.fillRect(0, 0, fwCanvas.width, fwCanvas.height);
    fwCtx.globalCompositeOperation = 'source-over';

    fwParticles = fwParticles.filter(p => p.life > 0.04);
    for (const p of fwParticles) {
      p.x += p.vx;
      p.y += p.vy;
      p.vy += 0.045;     // gravity
      p.vx *= 0.985;     // air drag
      p.vy *= 0.985;
      p.life -= 0.013;

      const a = Math.max(0, p.life);
      fwCtx.beginPath();
      fwCtx.arc(p.x, p.y, p.size * (0.4 + p.life * 0.6), 0, Math.PI * 2);
      fwCtx.fillStyle = `rgba(${p.r},${p.g},${p.b},${a})`;
      fwCtx.shadowColor = `rgba(${p.r},${p.g},${p.b},${a})`;
      fwCtx.shadowBlur = 10;
      fwCtx.fill();
    }
    fwCtx.shadowBlur = 0;

    if (fwParticles.length > 0) {
      fwRaf = requestAnimationFrame(fwAnimate);
    } else {
      fwRaf = null;
      fwCtx.clearRect(0, 0, fwCanvas.width, fwCanvas.height);
    }
  }

  function celebrationFireworks() {
    const W = window.innerWidth, H = window.innerHeight;
    const launches = [
      [W * 0.30, H * 0.42, 0],
      [W * 0.72, H * 0.38, 220],
      [W * 0.50, H * 0.28, 480],
      [W * 0.20, H * 0.55, 760],
      [W * 0.82, H * 0.58, 1020],
      [W * 0.50, H * 0.50, 1300],
    ];
    for (const [x, y, delay] of launches) {
      setTimeout(() => spawnFirework(x, y, null, 70 + Math.floor(Math.random() * 30)), delay);
    }
  }

  /* ============================================================
     SPARKLES
     ============================================================ */
  function spawnSparkles() {
    const cx = window.innerWidth  / 2;
    const cy = window.innerHeight / 2;
    const palette = ['#fde68a','#ffffff','#f9a8d4','#fff3c4','#c084fc','#fbbf24'];
    for (let i = 0; i < 24; i++) {
      const p = document.createElement('div');
      p.className = 'sparkle';
      const angle = (i / 24) * Math.PI * 2 + Math.random() * 0.4;
      const dist  = 70 + Math.random() * 170;
      p.style.setProperty('--tx', Math.cos(angle) * dist + 'px');
      p.style.setProperty('--ty', Math.sin(angle) * dist + 'px');
      p.style.left = cx + 'px';
      p.style.top  = cy + 'px';
      const sz = 3 + Math.random() * 5;
      p.style.width  = sz + 'px';
      p.style.height = sz + 'px';
      p.style.background = palette[Math.floor(Math.random() * palette.length)];
      p.style.animationDelay = (Math.random() * 0.08) + 's';
      document.body.appendChild(p);
      setTimeout(() => p.remove(), 1300);
    }
  }

  /* ============================================================
     COUNTDOWN
     ============================================================ */
  function startCountdown() {
    const cdOverlay = document.getElementById('cd-overlay');
    const cdText    = document.getElementById('cd-text');
    const flashEl   = document.getElementById('flash');

    const steps = [
      { text:'3',        cls:'num',     dur:950  },
      { text:'2',        cls:'num',     dur:950  },
      { text:'1',        cls:'num',     dur:950  },
      { text:'HAPPY',    cls:'word',    dur:1100 },
      { text:'BIRTHDAY', cls:'word',    dur:1100 },
      { text:'TO',       cls:'word',    dur:1100 },
      { text:'KÁ',       cls:'name ka', dur:2200 },
    ];

    cdOverlay.style.opacity = '1';
    let i = 0, done = false;

    // Show skip hint after a short delay so first-time users discover it too
    setTimeout(() => { if (!done) skipHint.style.opacity = '1'; }, 1800);

    function finish() {
      if (done) return;
      done = true;
      skipHint.style.opacity = '0';
      cdOverlay.style.transition = 'opacity 0.5s';
      cdOverlay.style.opacity    = '0';
      setTimeout(() => navigateTo('candle.html'), 550);
    }

    function next() {
      if (done) return;
      if (i >= steps.length) { finish(); return; }
      const { text, cls, dur } = steps[i++];
      cdText.className    = cls;
      cdText.textContent  = text;
      cdText.classList.remove('cd-anim');
      void cdText.offsetWidth;
      cdText.classList.add('cd-anim');

      if (cls.includes('ka')) {
        flashEl.classList.remove('burst');
        void flashEl.offsetWidth;
        flashEl.classList.add('burst');
        setTimeout(spawnSparkles, 50);
        setTimeout(celebrationFireworks, 80);
      }
      setTimeout(next, dur);
    }

    next();

    const onKey = (e) => { if (e.code === 'Space') { e.preventDefault(); removeH(); finish(); } };
    let lastTap = 0;
    const onTap = () => { const n = Date.now(); if (n - lastTap < 350) { removeH(); finish(); } lastTap = n; };
    function removeH() { document.removeEventListener('keydown', onKey); document.removeEventListener('pointerdown', onTap); }
    document.addEventListener('keydown', onKey);
    document.addEventListener('pointerdown', onTap);
  }
</script>
