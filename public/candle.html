<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Make a Wish ✨</title>
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;600;700&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Great+Vibes&family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100vh; height: 100dvh;
      overflow: hidden;
      background: #0a0008;
      cursor: default;
    }

    body { animation: fadein 1s ease forwards; }
    @keyframes fadein { from { opacity: 0; } to { opacity: 1; } }

    canvas { position: fixed; inset: 0; display: block; }

    /* ===== AURORA NEBULA ===== */
    #aurora {
      position: fixed; inset: -12%;
      z-index: 0; pointer-events: none;
      background:
        radial-gradient(ellipse 55% 45% at 22% 28%, rgba(255,80,170,0.22), transparent 62%),
        radial-gradient(ellipse 50% 55% at 78% 68%, rgba(255,100,180,0.18), transparent 65%),
        radial-gradient(ellipse 65% 40% at 50% 92%, rgba(180,30,90,0.22), transparent 55%),
        radial-gradient(ellipse 40% 30% at 12% 80%, rgba(140,20,70,0.18), transparent 60%);
      filter: blur(60px);
      animation: aurora-drift 22s ease-in-out infinite;
    }
    @keyframes aurora-drift {
      0%, 100% { transform: translate(0,0)        scale(1); }
      33%      { transform: translate(-1%, 1.4%)   scale(1.04); }
      66%      { transform: translate(1.5%, -1%)   scale(0.97); }
    }

    /* ===== EMBER PARTICLES ===== */
    .ember {
      position: fixed;
      width: 4px; height: 4px;
      border-radius: 50%;
      pointer-events: none;
      z-index: 4;
      background: radial-gradient(circle, #fff8c0 10%, #ffb060 55%, transparent 85%);
      box-shadow: 0 0 6px rgba(255,180,80,0.7);
      animation: ember-rise var(--dur, 2.6s) ease-out forwards;
    }
    @keyframes ember-rise {
      0%   { opacity: 0; transform: translate(0, 0) scale(0.5); }
      18%  { opacity: 1; transform: translate(var(--mid-x, 4px), -28px) scale(1.1); }
      100% { opacity: 0; transform: translate(var(--end-x, 16px), -130px) scale(0.25); }
    }

    /* ===== SPRINKLES on layers ===== */
    .sprinkles {
      position: absolute; inset: 0;
      pointer-events: none; overflow: hidden;
      border-radius: inherit;
    }
    .sprinkle {
      position: absolute;
      left: var(--sx, 50%); top: var(--sy, 50%);
      width: var(--sw, 2.5px); height: var(--sh, 6px);
      background: var(--sc, #fde68a);
      border-radius: 1.5px;
      transform: rotate(var(--sr, 0deg));
      box-shadow: 0 0 3px var(--sc, #fde68a);
      opacity: 0.92;
    }

    /* ===== WISH MESSAGE RAY BURST ===== */
    .wish-rays {
      position: absolute; left: 50%; top: 50%;
      width: 600px; height: 600px;
      transform: translate(-50%, -50%) scale(0);
      pointer-events: none;
      background:
        conic-gradient(from 0deg,
          rgba(255,210,80,0)   0deg,
          rgba(255,235,140,0.28) 18deg,
          rgba(255,210,80,0)   36deg,
          rgba(255,235,140,0.28) 54deg,
          rgba(255,210,80,0)   72deg,
          rgba(255,235,140,0.28) 90deg,
          rgba(255,210,80,0)   108deg,
          rgba(255,235,140,0.28) 126deg,
          rgba(255,210,80,0)   144deg,
          rgba(255,235,140,0.28) 162deg,
          rgba(255,210,80,0)   180deg,
          rgba(255,235,140,0.28) 198deg,
          rgba(255,210,80,0)   216deg,
          rgba(255,235,140,0.28) 234deg,
          rgba(255,210,80,0)   252deg,
          rgba(255,235,140,0.28) 270deg,
          rgba(255,210,80,0)   288deg,
          rgba(255,235,140,0.28) 306deg,
          rgba(255,210,80,0)   324deg,
          rgba(255,235,140,0.28) 342deg,
          rgba(255,210,80,0)   360deg);
      mask-image: radial-gradient(circle, #000 18%, transparent 70%);
      -webkit-mask-image: radial-gradient(circle, #000 18%, transparent 70%);
      filter: blur(0.5px);
    }
    #wish-msg.show .wish-rays {
      animation: ray-burst 2.6s ease-out forwards;
    }
    @keyframes ray-burst {
      0%   { transform: translate(-50%,-50%) scale(0)   rotate(0deg);   opacity: 0; }
      28%  { transform: translate(-50%,-50%) scale(1)   rotate(40deg);  opacity: 1; }
      75%  { transform: translate(-50%,-50%) scale(1.05) rotate(110deg); opacity: 1; }
      100% { transform: translate(-50%,-50%) scale(1.2)  rotate(140deg); opacity: 0; }
    }

    /* ===== SCENE ===== */
    #scene {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: clamp(16px, 3vh, 28px);
      z-index: 3;
      pointer-events: none;
    }

    #hint {
      font-family: 'Great Vibes', cursive;
      font-weight: 700;
      font-size: clamp(26px, 5.5vw, 42px);
      letter-spacing: 0.5px;
      background: linear-gradient(110deg,
        #fde68a 0%, #ffc1e3 28%, #ec4899 52%, #ffc1e3 76%, #fde68a 100%);
      background-size: 220% 100%;
      -webkit-background-clip: text; background-clip: text;
      -webkit-text-fill-color: transparent;
      filter: drop-shadow(0 0 14px rgba(251,146,60,0.45)) drop-shadow(0 0 26px rgba(251,207,232,0.34));
      animation: pulse-text 2.2s ease-in-out infinite, hint-shimmer 4.2s linear infinite;
      transition: opacity 0.8s ease;
    }
    @keyframes pulse-text {
      0%, 100% { opacity: 0.85; transform: translateY(0);    }
      50%       { opacity: 1;    transform: translateY(-2px); }
    }
    @keyframes hint-shimmer {
      0%   { background-position: 0% 50%; }
      100% { background-position: 220% 50%; }
    }

    /* ===== HALO GLOW (warm candlelight under cake) ===== */
    #cake-glow {
      position: fixed;
      bottom: 24%;
      left: 50%;
      transform: translateX(-50%);
      width: clamp(340px, 62vw, 620px);
      height: 140px;
      background: radial-gradient(ellipse at center,
        rgba(255,225,140,0.45) 0%,
        rgba(255,170,60,0.26)  32%,
        rgba(255,110,30,0.12)  58%,
        rgba(180,40,140,0.06)  76%,
        transparent 90%);
      pointer-events: none;
      z-index: 1;
      transition: opacity 1.8s ease;
      animation: glow-flicker 3s ease-in-out infinite;
      filter: blur(1.5px);
    }
    @keyframes glow-flicker {
      0%,100% { opacity: 0.85; transform: translateX(-50%) scaleX(1);   }
      50%      { opacity: 1;    transform: translateX(-50%) scaleX(1.05); }
    }
    #cake-glow.out { opacity: 0; animation: none; }

    /* ===== BIRTHDAY GIF FRAMES ===== */
    #gif-gallery {
      position: fixed;
      inset: 0;
      z-index: 2;
      pointer-events: none;
      overflow: hidden;
    }
    #gif-gallery.sticker-centered {
      z-index: 12;
    }
    .memory-gif {
      position: absolute;
      width: clamp(88px, 11vw, 158px);
      aspect-ratio: 9 / 16;
      padding: 4px;
      border: 1px solid rgba(251,207,232,0.45);
      border-radius: 8px;
      background:
        linear-gradient(145deg, rgba(255,255,255,0.18), rgba(236,72,153,0.10)),
        rgba(30,0,18,0.42);
      box-shadow:
        0 18px 42px rgba(0,0,0,0.36),
        0 0 26px rgba(236,72,153,0.18),
        inset 0 1px 0 rgba(255,255,255,0.22);
      opacity: 0;
      transform: rotate(var(--rot, 0deg)) scale(0.96);
    }
    .memory-gif.is-ready {
      animation: gif-frame-in 0.9s ease var(--delay, 0s) forwards;
    }
    .memory-gif.is-highlighted {
      opacity: 0.92;
      border-color: rgba(253,230,138,0.58);
      box-shadow:
        0 18px 44px rgba(0,0,0,0.38),
        0 0 30px rgba(253,230,138,0.22),
        0 0 46px rgba(236,72,153,0.18),
        inset 0 1px 0 rgba(255,255,255,0.26);
    }
    .memory-gif.is-ready.is-highlighted:not(.is-active) {
      animation: none;
      transform: rotate(var(--rot, 0deg)) scale(1);
      transition: transform 0.55s cubic-bezier(0.22,1,0.36,1), box-shadow 0.55s ease, border-color 0.55s ease;
    }
    .memory-gif-5.is-ready.is-highlighted:not(.is-active) {
      transform: translateX(-50%) rotate(var(--rot, 0deg)) scale(1);
    }
    .memory-gif.is-active {
      z-index: 4;
      opacity: 1;
      border-color: rgba(253,230,138,0.92);
      transform: rotate(var(--rot, 0deg)) scale(1.13);
      box-shadow:
        0 24px 60px rgba(0,0,0,0.48),
        0 0 0 1px rgba(255,255,255,0.18),
        0 0 34px rgba(253,230,138,0.62),
        0 0 76px rgba(236,72,153,0.48),
        inset 0 1px 0 rgba(255,255,255,0.34);
      transition: transform 0.55s cubic-bezier(0.22,1,0.36,1), box-shadow 0.55s ease, border-color 0.55s ease;
    }
    .memory-gif.is-active::before {
      background: radial-gradient(circle, rgba(253,230,138,0.40), rgba(236,72,153,0.22) 46%, transparent 74%);
      filter: blur(12px);
    }
    .memory-gif.is-active img {
      filter: saturate(1.2) brightness(1.08);
      animation: gif-highlight-float 1.7s ease-in-out infinite;
    }
    .memory-gif::before {
      content: '';
      position: absolute;
      inset: -16px;
      z-index: -1;
      border-radius: 14px;
      background: radial-gradient(circle, rgba(253,230,138,0.18), rgba(236,72,153,0.10) 46%, transparent 72%);
      filter: blur(8px);
    }
    .memory-gif img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 6px;
      user-select: none;
      -webkit-user-drag: none;
      filter: saturate(1.06) brightness(1.02);
      animation: gif-soft-float var(--dur, 6s) ease-in-out var(--delay, 0s) infinite;
    }
    .memory-gif-1 {
      left: clamp(16px, 5vw, 76px);
      top: clamp(74px, 15vh, 128px);
      --rot: -7deg;
      --delay: 0.12s;
      --dur: 6.4s;
    }
    .memory-gif-2 {
      right: clamp(18px, 5.6vw, 86px);
      top: clamp(88px, 16vh, 142px);
      width: clamp(92px, 11.8vw, 168px);
      --rot: 6deg;
      --delay: 0.28s;
      --dur: 7s;
    }
    .memory-gif-3 {
      left: clamp(34px, 8.5vw, 132px);
      bottom: clamp(36px, 10vh, 92px);
      --rot: 5deg;
      --delay: 0.44s;
      --dur: 6.8s;
    }
    .memory-gif-4 {
      right: clamp(30px, 8vw, 124px);
      bottom: clamp(34px, 11vh, 98px);
      width: clamp(82px, 10vw, 148px);
      --rot: -5deg;
      --delay: 0.6s;
      --dur: 6.1s;
    }
    .memory-gif-5 {
      left: 50%;
      top: clamp(24px, 5vh, 48px);
      width: clamp(82px, 9vw, 132px);
      aspect-ratio: 1 / 1;
      padding: 0;
      border: 0;
      border-radius: 0;
      background: transparent;
      box-shadow: none;
      --rot: 0deg;
      --delay: 0.76s;
      --dur: 5.8s;
      transform: translateX(-50%) rotate(var(--rot, 0deg)) scale(0.96);
    }
    .memory-gif-5::before {
      display: none;
    }
    .memory-gif-5 img {
      border-radius: 0;
      object-fit: contain;
      filter: drop-shadow(0 0 20px rgba(255,120,200,0.42));
    }
    .memory-gif-5.is-ready {
      animation: gif-frame-in-center 0.9s ease var(--delay, 0s) forwards;
    }
    .memory-gif-5.is-active {
      position: fixed;
      left: 50%;
      top: 50%;
      width: clamp(220px, 28vw, 360px);
      z-index: 11;
      transform: translate(-50%, -50%) rotate(0deg) scale(1);
      box-shadow: none;
      transition: transform 0.95s cubic-bezier(0.16,1,0.3,1), width 0.95s cubic-bezier(0.16,1,0.3,1);
    }
    .memory-gif-5.is-active img {
      filter:
        drop-shadow(0 0 18px rgba(253,230,138,0.70))
        drop-shadow(0 0 42px rgba(236,72,153,0.48));
      animation: sticker-center-float 2s ease-in-out infinite;
    }
    @keyframes gif-frame-in {
      from {
        opacity: 0;
        transform: translateY(14px) rotate(var(--rot, 0deg)) scale(0.92);
      }
      to {
        opacity: 0.88;
        transform: translateY(0) rotate(var(--rot, 0deg)) scale(1);
      }
    }
    @keyframes gif-frame-in-center {
      from {
        opacity: 0;
        transform: translateX(-50%) translateY(14px) rotate(var(--rot, 0deg)) scale(0.92);
      }
      to {
        opacity: 0.88;
        transform: translateX(-50%) translateY(0) rotate(var(--rot, 0deg)) scale(1);
      }
    }
    @keyframes gif-soft-float {
      0%, 100% { transform: translateY(0); }
      50%      { transform: translateY(-9px); }
    }
    @keyframes gif-highlight-float {
      0%, 100% { transform: translateY(-2px) scale(1); }
      50%      { transform: translateY(-12px) scale(1.025); }
    }
    @keyframes sticker-center-float {
      0%, 100% { transform: translateY(0) scale(1); }
      50%      { transform: translateY(-10px) scale(1.04); }
    }

    /* ===== CAKE ===== */
    .cake {
      display: flex; flex-direction: column; align-items: center;
      animation: cake-float 4.8s ease-in-out infinite;
      filter: drop-shadow(0 14px 32px rgba(140,10,70,0.55));
      cursor: pointer;
      pointer-events: auto;
    }
    @keyframes cake-float {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-7px); }
    }

    .candles-row {
      display: flex;
      gap: clamp(14px, 3.5vw, 26px);
      margin-bottom: -2px;
      position: relative;
      z-index: 3;
      align-items: flex-end;
    }

    .candle {
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
    }

    .flame-wrap {
      position: relative;
      width: clamp(12px, 2vw, 16px);
      height: clamp(22px, 3.5vw, 30px);
      display: flex;
      align-items: flex-end;
      justify-content: center;
    }

    /* Flame — duration/delay set per-candle via JS for random flicker */
    .flame {
      width: clamp(10px, 1.8vw, 14px);
      height: clamp(18px, 3vw, 24px);
      background: radial-gradient(ellipse at 50% 80%,
        #fff 0%, #ffe066 22%, #ff9500 52%, rgba(255,60,0,0.25) 82%, transparent 100%);
      border-radius: 50% 50% 30% 30% / 60% 60% 40% 40%;
      animation: flicker 0.22s ease-in-out infinite alternate;
      filter: drop-shadow(0 0 7px rgba(255,180,0,0.95));
      transition: opacity 0.35s ease, transform 0.35s ease;
      flex-shrink: 0;
    }
    @keyframes flicker {
      0%   { transform: scaleX(1)    scaleY(1)    rotate(-2deg); }
      100% { transform: scaleX(0.82) scaleY(0.88) rotate(2.5deg); }
    }
    .flame.out { opacity: 0; transform: scaleY(0) !important; }

    /* Smoke — base puff */
    .smoke {
      position: absolute;
      top: -2px; left: 50%;
      transform: translateX(-50%);
      width: 5px; height: 28px;
      opacity: 0;
      background: linear-gradient(to top, rgba(220,180,200,0.6), transparent);
      border-radius: 50%;
      pointer-events: none;
    }
    .smoke.puff { animation: smoke-up 1.9s ease-out forwards; }
    @keyframes smoke-up {
      0%   { opacity: 0.65; transform: translateX(-50%) translateY(0)    scaleX(1);   }
      40%  { opacity: 0.35; transform: translateX(-55%) translateY(-20px) scaleX(1.9); }
      100% { opacity: 0;    transform: translateX(-48%) translateY(-46px) scaleX(3.2); }
    }

    /* Extra drift puffs — drift direction via --drift CSS var */
    .smoke-extra {
      position: absolute;
      top: -2px; left: 50%;
      width: 4px; height: 22px;
      opacity: 0;
      background: linear-gradient(to top, rgba(220,180,200,0.5), transparent);
      border-radius: 50%;
      pointer-events: none;
      animation: smoke-drift 2.1s ease-out forwards;
    }
    @keyframes smoke-drift {
      0%   { opacity: 0.55; transform: translateX(-50%) translateY(0) scaleX(1); }
      45%  { opacity: 0.28; transform: translateX(calc(-50% + var(--drift, 14px))) translateY(-26px) scaleX(2); }
      100% { opacity: 0;    transform: translateX(calc(-50% + calc(var(--drift, 14px) * 1.6))) translateY(-54px) scaleX(3.5); }
    }

    /* Candle body */
    .candle-body {
      width: clamp(12px, 2vw, 16px);
      height: clamp(30px, 5vw, 46px);
      background: linear-gradient(170deg, #fce7f3 0%, #f9a8d4 28%, #db2777 62%, #831843 100%);
      border-radius: 3px 3px 2px 2px;
      box-shadow:
        inset -2px 0 4px rgba(0,0,0,0.20),
        inset 2px 0 4px rgba(255,200,220,0.18),
        0 0 6px rgba(219,39,119,0.18);
      position: relative;
    }
    .candle-body::before {
      content: '';
      position: absolute;
      top: -5px; left: 50%;
      transform: translateX(-50%);
      width: 2px; height: 6px;
      background: #2a0010;
      border-radius: 1px;
    }
    .candle-body::after {
      content: '';
      position: absolute;
      top: 28%; left: 0; right: 0;
      height: 1.5px;
      background: rgba(255,210,230,0.42);
    }

    /* Camera shake on blow */
    .cake.shake { animation: cam-shake 0.28s ease; }
    @keyframes cam-shake {
      0%   { transform: translateX(0);   }
      20%  { transform: translateX(-3px); }
      40%  { transform: translateX(3px);  }
      60%  { transform: translateX(-2px); }
      80%  { transform: translateX(2px);  }
      100% { transform: translateX(0);   }
    }

    /* Cake layers — 3D cylinder feel with ellipse top face */
    .layer { border-radius: 4px; position: relative; }
    /* Top face — ellipse simulating the cylinder top */
    .layer::after {
      content: '';
      position: absolute;
      top: -8px; left: -2px; right: -2px;
      height: 16px;
      background: var(--top-bg, radial-gradient(ellipse at 50% 50%, #a51860 0%, #5c0030 75%));
      border-radius: 50%;
      border: 1px solid var(--top-border, rgba(255,170,220,0.48));
      box-shadow:
        inset 0 -3px 6px rgba(0,0,0,0.42),
        inset 0 2px 4px rgba(255,255,255,0.18),
        0 1px 0 rgba(255,255,255,0.06);
      z-index: 2;
    }

    .layer-top {
      width: clamp(130px, 22vw, 200px);
      height: clamp(34px, 5.5vw, 52px);
      background:
        linear-gradient(90deg, rgba(0,0,0,0.30) 0%, transparent 18%, transparent 82%, rgba(0,0,0,0.30) 100%),
        linear-gradient(175deg, #8a1450 0%, #54002a 55%, #380018 100%);
      border-left: 1px solid rgba(180,10,90,0.58);
      border-right: 1px solid rgba(180,10,90,0.58);
      box-shadow:
        inset 0 -4px 8px rgba(0,0,0,0.32),
        0 6px 24px rgba(180,10,90,0.45);
      --top-bg: radial-gradient(ellipse at 50% 50%, #b8186a 0%, #7e0040 70%, #500028 100%);
      --top-border: rgba(255,170,220,0.58);
    }
    .layer-top > .label {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%,-50%);
      color: rgba(255,180,210,0.34);
      font-size: 11px;
      letter-spacing: 7px;
      white-space: nowrap;
      z-index: 1;
    }

    .layer-mid {
      width: clamp(185px, 31vw, 285px);
      height: clamp(42px, 7vw, 64px);
      background:
        linear-gradient(90deg, rgba(0,0,0,0.32) 0%, transparent 16%, transparent 84%, rgba(0,0,0,0.32) 100%),
        linear-gradient(180deg, #5e0030 0%, #480024 50%, #300018 100%);
      border-left: 1px solid rgba(120,5,60,0.58);
      border-right: 1px solid rgba(120,5,60,0.58);
      box-shadow:
        inset 0 -4px 8px rgba(0,0,0,0.4),
        0 0 20px rgba(200,20,90,0.32);
      margin-top: -3px;
      --top-bg: radial-gradient(ellipse at 50% 50%, #90114a 0%, #5a002c 70%, #3a001a 100%);
      --top-border: rgba(255,140,200,0.5);
    }
    /* "17" — warm gold, pulses with candle rhythm */
    .layer-mid > .label {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%,-50%);
      font-family: 'Great Vibes', cursive;
      font-size: clamp(26px, 4vw, 36px);
      color: rgba(253,230,138,0.55);
      letter-spacing: 4px;
      animation: num-pulse 2.2s ease-in-out infinite;
      z-index: 1;
    }
    @keyframes num-pulse {
      0%, 100% { color: rgba(253,230,138,0.45); text-shadow: 0 0 6px rgba(245,158,11,0.25); }
      50%       { color: rgba(253,230,138,0.92); text-shadow: 0 0 18px rgba(245,158,11,0.7); }
    }

    .layer-bot {
      width: clamp(240px, 40vw, 375px);
      height: clamp(50px, 8.5vw, 78px);
      background:
        linear-gradient(90deg, rgba(0,0,0,0.34) 0%, transparent 14%, transparent 86%, rgba(0,0,0,0.34) 100%),
        linear-gradient(180deg, #480024 0%, #34001a 55%, #1e000e 100%);
      border-left: 1px solid rgba(100,5,50,0.58);
      border-right: 1px solid rgba(100,5,50,0.58);
      box-shadow:
        inset 0 -4px 10px rgba(0,0,0,0.45),
        0 0 30px rgba(180,10,90,0.36),
        0 8px 20px rgba(0,0,0,0.45);
      margin-top: -3px;
      --top-bg: radial-gradient(ellipse at 50% 50%, #780a3a 0%, #420020 70%, #240010 100%);
      --top-border: rgba(255,120,180,0.45);
    }
    .layer-bot > .label {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%,-50%);
      color: rgba(236,72,153,0.32);
      font-size: 11px;
      letter-spacing: 7px;
      white-space: nowrap;
      z-index: 1;
    }

    /* ===== CREAM DRIPS BETWEEN TIERS ===== */
    .tier-cream {
      width: 100%;
      height: 14px;
      position: relative;
      margin-top: -2px;
      pointer-events: none;
      z-index: 3;
    }
    .tier-cream .cd {
      position: absolute;
      top: 0;
      width: var(--w, 12px);
      height: var(--h, 12px);
      background: linear-gradient(180deg,
        rgba(255,242,220,0.92) 0%,
        rgba(255,228,190,0.85) 55%,
        rgba(255,210,160,0.75) 100%);
      border-radius: 0 0 50% 50%;
      box-shadow:
        inset 0 -2px 3px rgba(180,100,40,0.18),
        inset 0 2px 2px rgba(255,255,255,0.45),
        0 2px 4px rgba(0,0,0,0.18);
    }
    .tier-cream .cd::after {
      content: '';
      position: absolute;
      top: 18%; left: 22%;
      width: 28%; height: 35%;
      background: rgba(255,255,255,0.55);
      border-radius: 50%;
      filter: blur(1px);
    }

    /* Frosting drips — ivory cream */
    .drips {
      display: flex;
      width: clamp(130px, 22vw, 200px);
      justify-content: space-around;
      margin-bottom: -1px;
      position: relative;
      z-index: 2;
    }
    .drip {
      width: clamp(9px, 1.5vw, 13px);
      height: clamp(7px, 1.3vw, 11px);
      background: rgba(255,242,220,0.20);
      border-radius: 0 0 50% 50%;
      border: 1px solid rgba(255,225,180,0.30);
      border-top: none;
    }

    .plate {
      width: clamp(285px, 48vw, 445px);
      height: clamp(14px, 2.2vw, 22px);
      background:
        radial-gradient(ellipse at 50% 30%,
          rgba(245,200,120,0.38) 0%,
          rgba(195,135,70,0.25) 45%,
          rgba(120,55,40,0.12) 80%,
          transparent 100%);
      border-radius: 50%;
      border-top: 1px solid rgba(255,210,140,0.42);
      box-shadow:
        inset 0 -3px 6px rgba(80,30,10,0.45),
        inset 0 2px 3px rgba(255,225,180,0.35),
        0 8px 22px rgba(0,0,0,0.5);
      margin-top: 2px;
      position: relative;
    }
    .plate::after {
      content: '';
      position: absolute;
      left: 22%; right: 22%;
      top: 14%;
      height: 22%;
      background: linear-gradient(90deg, transparent, rgba(255,240,210,0.28), transparent);
      border-radius: 50%;
      filter: blur(1px);
    }

    /* ===== WISH MESSAGE ===== */
    #wish-msg {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10;
      pointer-events: none;
      opacity: 0;
    }
    #wish-msg.show { animation: wish-fade 2.8s ease forwards; }
    @keyframes wish-fade {
      0%   { opacity: 0; }
      22%  { opacity: 1; }
      75%  { opacity: 1; }
      100% { opacity: 0; }
    }
    #wish-msg span {
      font-family: 'Great Vibes', cursive;
      font-weight: 700;
      font-size: clamp(34px, 7vw, 64px);
      letter-spacing: 0.6px;
      background: linear-gradient(110deg,
        #fff7d6 0%, #fde68a 25%, #ffb4d8 50%, #ec4899 75%, #fff7d6 100%);
      background-size: 220% 100%;
      -webkit-background-clip: text; background-clip: text;
      -webkit-text-fill-color: transparent;
      filter: drop-shadow(0 0 18px rgba(255,200,60,0.85)) drop-shadow(0 0 40px rgba(255,150,0,0.45));
      text-align: center;
      padding: 0 20px;
      animation: wish-shimmer 3s linear infinite;
    }
    @keyframes wish-shimmer {
      0%   { background-position: 0% 50%; }
      100% { background-position: 220% 50%; }
    }

    /* ===== CONFETTI ===== */
    .confetti-piece {
      position: fixed;
      width: var(--w, 6px);
      height: var(--h, 8px);
      background: var(--color, #ff69b4);
      top: -12px;
      left: var(--x, 50%);
      z-index: 14;
      pointer-events: none;
      opacity: 1;
      animation: confetti-fall var(--dur, 3s) ease-in var(--delay, 0s) forwards;
    }
    @keyframes confetti-fall {
      0%   { top: -12px; transform: rotate(0deg) translateX(0); opacity: 1; }
      80%  { opacity: 1; }
      100% { top: 110vh;  transform: rotate(var(--spin, 360deg)) translateX(var(--sway, 30px)); opacity: 0; }
    }

    /* ===== MUTE BUTTON ===== */
    #mute-btn {
      position: fixed;
      top: 14px; right: 14px;
      z-index: 20;
      display: flex; align-items: center; gap: 5px;
      padding: 8px 18px; border-radius: 22px;
      background: linear-gradient(120deg,
        rgba(255,255,255,0.10) 0%,
        rgba(236,72,153,0.16) 50%,
        rgba(255,180,220,0.10) 100%);
      border: 1px solid rgba(251,207,232,0.32);
      color: rgba(255,238,248,0.90); font-size: 13px; font-weight: 500;
      cursor: pointer; backdrop-filter: blur(12px);
      box-shadow: 0 4px 14px rgba(0,0,0,0.18), inset 0 1px 0 rgba(255,255,255,0.12);
      transition: background 0.2s, border-color 0.2s, transform 0.18s, box-shadow 0.18s;
      pointer-events: auto; white-space: nowrap;
    }
    #mute-btn:hover {
      background: linear-gradient(120deg,
        rgba(255,255,255,0.18) 0%,
        rgba(236,72,153,0.28) 50%,
        rgba(255,180,220,0.18) 100%);
      border-color: rgba(251,207,232,0.58);
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(236,72,153,0.32), inset 0 1px 0 rgba(255,255,255,0.18);
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }

    /* ===== AUTOPLAY BUTTON ===== */
    #play-btn {
      position: fixed; bottom: 20px; left: 50%;
      transform: translateX(-50%);
      z-index: 200; display: none;
      align-items: center; gap: 7px;
      background: rgba(245,158,11,0.16);
      border: 1px solid rgba(245,158,11,0.45);
      border-radius: 22px; padding: 8px 20px;
      color: rgba(253,230,138,0.92); font-size: 13px; cursor: pointer;
      backdrop-filter: blur(10px); white-space: nowrap;
      animation: play-pulse 2s ease-in-out infinite;
    }
    @keyframes play-pulse {
      0%,100% { box-shadow: 0 0 0 0 rgba(245,158,11,0.35); }
      50%     { box-shadow: 0 0 0 10px rgba(245,158,11,0); }
    }

    /* Page-out transition overlay */
    #nav-overlay {
      position: fixed; inset: 0; background: #000;
      z-index: 9999; opacity: 0;
      transition: opacity 0.42s ease;
      pointer-events: none;
    }

    /* ===== MOBILE / SAFE AREA ===== */
    @supports (padding: env(safe-area-inset-top)) {
      #mute-btn {
        top:   max(12px, calc(env(safe-area-inset-top) + 6px));
        right: max(12px, calc(env(safe-area-inset-right) + 8px));
      }
      #play-btn {
        bottom: max(20px, calc(env(safe-area-inset-bottom) + 14px));
      }
    }
    @media (max-width: 700px) {
      .memory-gif {
        width: clamp(56px, 18vw, 82px);
        padding: 3px;
      }
      .memory-gif-1 {
        left: 12px;
        top: max(82px, 13dvh);
      }
      .memory-gif-2 {
        right: 12px;
        top: max(104px, 16dvh);
        width: clamp(58px, 18vw, 84px);
      }
      .memory-gif-3 {
        left: 14px;
        bottom: max(18px, calc(env(safe-area-inset-bottom) + 14px));
      }
      .memory-gif-4 {
        right: 14px;
        bottom: max(28px, calc(env(safe-area-inset-bottom) + 24px));
        width: clamp(54px, 17vw, 76px);
      }
      .memory-gif-5 {
        top: 14px;
        width: clamp(52px, 16vw, 76px);
      }
      .memory-gif-5.is-active {
        top: 50%;
        width: min(58vw, 240px);
      }
      @keyframes gif-frame-in {
        from {
          opacity: 0;
          transform: translateY(10px) rotate(var(--rot, 0deg)) scale(0.92);
        }
        to {
          opacity: 0.76;
          transform: translateY(0) rotate(var(--rot, 0deg)) scale(1);
        }
      }
    }
    @media (max-height: 560px) {
      .memory-gif {
        width: clamp(54px, 9vw, 100px);
      }
      .memory-gif-1,
      .memory-gif-2 {
        top: 58px;
      }
      .memory-gif-3,
      .memory-gif-4 {
        bottom: 14px;
      }
      .memory-gif-5 {
        top: 10px;
      }
      .memory-gif-5.is-active {
        top: 50%;
        width: min(34vw, 220px);
      }
    }
    /* Cake shrinks on very small screens */
    @media (max-width: 360px) {
      .layer-top  { width: clamp(110px, 30vw, 140px); }
      .layer-mid  { width: clamp(155px, 42vw, 200px); }
      .layer-bot  { width: clamp(200px, 54vw, 260px); }
      .drips      { width: clamp(110px, 30vw, 140px); }
      .plate      { width: clamp(220px, 60vw, 280px); }
      #hint { font-size: clamp(17px, 4vw, 22px); }
    }

    /* ===== DESIGN POLISH OVERRIDES ===== */
    :root {
      --ui-gold: #fde68a;
      --ui-pink: #f472b6;
      --ui-rose: #ec4899;
      --ui-ink: #0d0008;
      --ui-glass: rgba(255, 245, 250, 0.10);
      --ui-line: rgba(253, 230, 138, 0.42);
      --ui-shadow: 0 24px 70px rgba(0, 0, 0, 0.46);
      --ui-ease: cubic-bezier(0.22, 1, 0.36, 1);
    }

    .sr-only {
      position: absolute;
      width: 1px; height: 1px;
      padding: 0; margin: -1px;
      overflow: hidden; clip: rect(0, 0, 0, 0);
      white-space: nowrap; border: 0;
    }
    .ui-icon {
      width: 18px;
      height: 18px;
      display: inline-grid;
      place-items: center;
      flex: 0 0 auto;
    }
    .ui-icon svg {
      width: 100%;
      height: 100%;
      display: block;
    }
    #mute-btn .sound-off { display: none; }
    #mute-btn.is-muted .sound-on { display: none; }
    #mute-btn.is-muted .sound-off { display: inline-grid; }

    body {
      background:
        linear-gradient(180deg, #10000a 0%, #210815 44%, #070004 100%);
      color-scheme: dark;
    }
    #aurora {
      opacity: 0.9;
      filter: blur(64px) saturate(1.18);
    }
    #cake-glow {
      bottom: 23%;
      width: clamp(340px, 58vw, 660px);
      height: 160px;
      background:
        radial-gradient(ellipse at center, rgba(255,230,150,0.52) 0%, rgba(255,170,60,0.28) 31%, rgba(236,72,153,0.14) 58%, transparent 84%);
      filter: blur(2px);
    }
    #scene {
      isolation: isolate;
    }
    #scene::before {
      content: '';
      position: absolute;
      left: 50%;
      top: 51%;
      width: min(78vw, 820px);
      height: min(56vh, 430px);
      transform: translate(-50%, -50%);
      z-index: -1;
      pointer-events: none;
      background: radial-gradient(ellipse at center, rgba(80, 10, 44, 0.54), rgba(38, 3, 22, 0.20) 54%, transparent 76%);
    }
    #hint {
      max-width: min(92vw, 760px);
      text-align: center;
      text-wrap: balance;
      font-family: 'Caveat', 'Great Vibes', cursive;
      font-size: clamp(28px, 5.4vw, 48px);
      letter-spacing: 0;
      filter:
        drop-shadow(0 0 16px rgba(253,230,138,0.32))
        drop-shadow(0 14px 34px rgba(0,0,0,0.52));
    }
    .cake {
      filter:
        drop-shadow(0 18px 40px rgba(0,0,0,0.46))
        drop-shadow(0 0 30px rgba(236,72,153,0.24));
      transition: filter 0.28s var(--ui-ease);
    }
    .cake:hover {
      filter:
        drop-shadow(0 24px 50px rgba(0,0,0,0.50))
        drop-shadow(0 0 42px rgba(253,230,138,0.28));
    }
    .layer {
      border-radius: 6px;
      overflow: visible;
    }
    .layer-top,
    .layer-mid,
    .layer-bot {
      box-shadow:
        inset 0 -5px 12px rgba(0,0,0,0.34),
        inset 0 1px 0 rgba(255,255,255,0.10),
        0 12px 34px rgba(120, 0, 52, 0.34);
    }
    .layer-mid > .label {
      text-shadow: 0 0 14px rgba(253,230,138,0.62), 0 4px 18px rgba(0,0,0,0.45);
    }
    .candle-body {
      border: 1px solid rgba(255,210,230,0.22);
      box-shadow:
        inset -2px 0 4px rgba(0,0,0,0.22),
        inset 2px 0 5px rgba(255,220,236,0.24),
        0 0 12px rgba(236,72,153,0.16);
    }
    .flame {
      filter:
        drop-shadow(0 0 8px rgba(255,180,0,0.98))
        drop-shadow(0 0 20px rgba(245,158,11,0.42));
    }
    .plate {
      filter: drop-shadow(0 16px 24px rgba(0,0,0,0.30));
    }
    .memory-gif {
      border-color: rgba(253,230,138,0.38);
      background:
        linear-gradient(145deg, rgba(255,255,255,0.22), rgba(236,72,153,0.12)),
        rgba(24,0,14,0.52);
      backdrop-filter: blur(8px) saturate(1.12);
      box-shadow:
        0 20px 52px rgba(0,0,0,0.40),
        0 0 30px rgba(236,72,153,0.16),
        inset 0 1px 0 rgba(255,255,255,0.24);
    }
    .memory-gif.is-active {
      box-shadow:
        0 28px 68px rgba(0,0,0,0.54),
        0 0 0 1px rgba(255,255,255,0.18),
        0 0 40px rgba(253,230,138,0.68),
        0 0 88px rgba(236,72,153,0.48),
        inset 0 1px 0 rgba(255,255,255,0.34);
    }
    #wish-msg span {
      text-wrap: balance;
      text-shadow: 0 0 28px rgba(253,230,138,0.45), 0 14px 38px rgba(0,0,0,0.58);
    }
    #mute-btn,
    #play-btn {
      min-height: 40px;
      border-radius: 999px;
      font-family: 'Quicksand', system-ui, sans-serif;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0;
      align-items: center;
      justify-content: center;
      gap: 8px;
      background:
        linear-gradient(135deg, rgba(255,255,255,0.16), rgba(244,114,182,0.16)),
        rgba(45, 4, 25, 0.62);
      border-color: var(--ui-line);
      color: #fff7df;
      box-shadow: var(--ui-shadow), inset 0 1px 0 rgba(255,255,255,0.18);
    }
    #mute-btn { display: inline-flex; }
    #mute-btn:hover,
    #play-btn:hover {
      border-color: rgba(253,230,138,0.64);
      box-shadow: 0 28px 76px rgba(0,0,0,0.50), 0 0 28px rgba(244,114,182,0.26), inset 0 1px 0 rgba(255,255,255,0.22);
    }
    #mute-btn:focus-visible,
    #play-btn:focus-visible,
    .cake:focus-visible {
      outline: 3px solid rgba(253,230,138,0.82);
      outline-offset: 4px;
    }
    @media (max-width: 700px) {
      #scene {
        gap: clamp(12px, 2.6vh, 20px);
      }
      #scene::before {
        width: calc(100vw - 22px);
        height: min(58vh, 430px);
      }
      #hint {
        max-width: calc(100vw - 28px);
        font-size: clamp(22px, 7.2vw, 34px);
      }
      .memory-gif {
        opacity: 0.72;
      }
      .memory-gif.is-active {
        opacity: 1;
      }
      #mute-btn {
        padding: 8px 14px;
        right: 10px;
        top: max(10px, calc(env(safe-area-inset-top) + 8px));
      }
    }
  </style>
</head>
<body>
<canvas id="c"></canvas>
<div id="aurora"></div>
<div id="cake-glow"></div>
<div id="gif-gallery" aria-hidden="true">
  <div class="memory-gif memory-gif-1"><img data-gif-src="data/1.gif" alt="" draggable="false" decoding="async"></div>
  <div class="memory-gif memory-gif-2"><img data-gif-src="data/2.gif" alt="" draggable="false" decoding="async"></div>
  <div class="memory-gif memory-gif-3"><img data-gif-src="data/3.gif" alt="" draggable="false" decoding="async"></div>
  <div class="memory-gif memory-gif-4"><img data-gif-src="data/4.gif" alt="" draggable="false" decoding="async"></div>
  <div class="memory-gif memory-gif-5"><img data-gif-src="data/sticker.gif" alt="" draggable="false" decoding="async"></div>
</div>

<div id="scene">
  <div id="hint">✦ Ước một điều rồi chạm bánh kem nha ✦</div>
  <div class="cake" id="cake">
    <div class="candles-row" id="candles-row"></div>
    <div class="drips" id="drips"></div>
    <div class="layer layer-top"><span class="label">· · · · ·</span></div>
    <div class="tier-cream" id="cream-mid"></div>
    <div class="layer layer-mid"><span class="label">17</span></div>
    <div class="tier-cream" id="cream-bot"></div>
    <div class="layer layer-bot"><span class="label">· · · · ·</span></div>
    <div class="plate"></div>
  </div>
</div>

<div id="wish-msg">
  <div class="wish-rays"></div>
  <span>Hép pi bớt đâyyyy!</span>
</div>
<button id="mute-btn" type="button" aria-label="Tắt nhạc" aria-pressed="false">
  <span class="ui-icon sound-on" aria-hidden="true">
    <svg viewBox="0 0 24 24" focusable="false">
      <path d="M4 9.25v5.5h3.2L12 18.6V5.4L7.2 9.25H4Z" fill="currentColor"/>
      <path d="M15.2 8.2a5.2 5.2 0 0 1 0 7.6M17.8 5.8a8.8 8.8 0 0 1 0 12.4" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
    </svg>
  </span>
  <span class="ui-icon sound-off" aria-hidden="true">
    <svg viewBox="0 0 24 24" focusable="false">
      <path d="M4 9.25v5.5h3.2L12 18.6V5.4L7.2 9.25H4Z" fill="currentColor"/>
      <path d="M16 9l5 5m0-5-5 5" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round"/>
    </svg>
  </span>
  <span class="sr-only">Nhạc</span>
</button>
<div id="nav-overlay"></div>
<button id="play-btn" type="button" aria-label="Bật nhạc">
  <span class="ui-icon" aria-hidden="true">
    <svg viewBox="0 0 24 24" focusable="false">
      <path d="M8 5.5v13L18.5 12 8 5.5Z" fill="currentColor"/>
    </svg>
  </span>
  <span>Bật nhạc</span>
</button>

<script>
  // Load large memory GIFs after the main candle scene is ready.
  function loadMemoryGifs() {
    document.querySelectorAll('#gif-gallery img[data-gif-src]').forEach((img, i) => {
      setTimeout(() => {
        const frame = img.closest('.memory-gif');
        frame?.classList.add('is-ready');
        img.src = img.dataset.gifSrc;
      }, 140 * i);
    });
  }
  if (document.readyState === 'complete') loadMemoryGifs();
  else window.addEventListener('load', loadMemoryGifs, { once: true });

  // ── Stars background ─────────────────────────────────────
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');
  let gradient;

  const isMobile = window.innerWidth < 768;
  const STAR_COUNT = isMobile ? 120 : 260;

  function resize() {
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
    gradient = ctx.createRadialGradient(
      canvas.width*.5, canvas.height*.3, 0,
      canvas.width*.5, canvas.height*.5, canvas.height
    );
    gradient.addColorStop(0,   '#280816');
    gradient.addColorStop(0.4, '#1a0510');
    gradient.addColorStop(1,   '#080004');
  }

  let stars = [];
  function initStars() {
    const palette = [[255,255,255],[220,210,255],[200,220,255],[255,240,210]];
    stars = Array.from({ length: STAR_COUNT }, () => ({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      r: Math.random() * 1.5 + 0.2,
      alpha: Math.random(),
      speed: Math.random() * 0.006 + 0.002,
      dir: Math.random() > 0.5 ? 1 : -1,
      color: palette[Math.floor(Math.random() * palette.length)],
    }));
  }

  let shooters = [];
  const shooterIv = setInterval(() => {
    shooters.push({
      x: Math.random()*canvas.width*0.8, y: Math.random()*canvas.height*0.4,
      len: Math.random()*120+60, spd: Math.random()*10+8, alpha: 1, tail: 0,
    });
  }, 3500);

  function drawFrame() {
    ctx.fillStyle = gradient;
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    for (const s of stars) {
      s.alpha += s.speed * s.dir;
      if (s.alpha >= 1)   { s.alpha = 1;   s.dir = -1; }
      if (s.alpha <= 0.1) { s.alpha = 0.1; s.dir =  1; }
      const [r,g,b] = s.color;
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI*2);
      ctx.fillStyle = `rgba(${r},${g},${b},${s.alpha})`;
      ctx.fill();
    }
    shooters = shooters.filter(sh => sh.alpha > 0);
    for (const sh of shooters) {
      sh.tail += sh.spd; sh.alpha -= 0.018;
      const g2 = ctx.createLinearGradient(sh.x+sh.tail-sh.len, sh.y+sh.tail-sh.len, sh.x+sh.tail, sh.y+sh.tail);
      g2.addColorStop(0, 'rgba(255,255,255,0)');
      g2.addColorStop(1, `rgba(255,255,255,${sh.alpha})`);
      ctx.beginPath();
      ctx.moveTo(sh.x+sh.tail-sh.len, sh.y+sh.tail-sh.len);
      ctx.lineTo(sh.x+sh.tail, sh.y+sh.tail);
      ctx.strokeStyle = g2; ctx.lineWidth = 1.5; ctx.stroke();
    }
    requestAnimationFrame(drawFrame);
  }

  resize(); initStars();
  window.addEventListener('resize', () => { resize(); initStars(); });
  drawFrame();

  // ── Music ────────────────────────────────────────────────
  const music = new Audio('data/music.mp3');
  music.loop = true;
  music.currentTime = parseFloat(sessionStorage.getItem('musicTime') || '0');
  const playBtn = document.getElementById('play-btn');
  music.play().catch(() => { playBtn.style.display = 'flex'; });
  playBtn.addEventListener('click', () => {
    music.play().catch(() => {});
    playBtn.style.display = 'none';
  });

  // ── Navigate with fade + volume fade ────────────────────
  const navOverlay = document.getElementById('nav-overlay');
  function navigateTo(href) {
    /* stop background spawners so they don't run past navigation */
    clearInterval(shooterIv);

    navOverlay.style.pointerEvents = 'all';
    navOverlay.style.opacity = '1';
    const origVol = music.volume;
    let step = 0;
    const iv = setInterval(() => {
      step++;
      music.volume = Math.max(0, origVol * (1 - step / 20));
      if (step >= 20) {
        clearInterval(iv);
        sessionStorage.setItem('musicTime',
          music.readyState >= 2 ? music.currentTime : parseFloat(sessionStorage.getItem('musicTime') || '0'));
        window.location.href = href;
      }
    }, 20);
  }

  // ── Tab visibility — pause shooting stars ────────────────
  document.addEventListener('visibilitychange', () => {
    if (document.hidden) shooters.length = 0; // clear queue when hidden
  });

  // Mute toggle
  const muteBtn = document.getElementById('mute-btn');
  let muted = false;
  muteBtn.addEventListener('click', e => {
    e.stopPropagation();
    muted = !muted;
    music.muted = muted;
    muteBtn.classList.toggle('is-muted', muted);
    muteBtn.setAttribute('aria-pressed', muted ? 'true' : 'false');
    muteBtn.setAttribute('aria-label', muted ? 'Bật nhạc' : 'Tắt nhạc');
  });

  // ── Build cake ───────────────────────────────────────────
  const N_CANDLES = 5;
  const row   = document.getElementById('candles-row');
  const drips = document.getElementById('drips');

  for (let i = 0; i < 7; i++) {
    const d = document.createElement('div');
    d.className = 'drip';
    drips.appendChild(d);
  }

  // Randomised flicker timing per candle
  const flickerDurations = [0.19, 0.24, 0.21, 0.27, 0.18];
  const flickerDelays    = [0,    0.07, 0.14, 0.04, 0.11 ];

  const flames = [], smokes = [], flameWraps = [];
  for (let i = 0; i < N_CANDLES; i++) {
    const c = document.createElement('div');
    c.className = 'candle';
    c.innerHTML = `
      <div class="flame-wrap">
        <div class="flame" id="fl-${i}"></div>
        <div class="smoke" id="sm-${i}"></div>
      </div>
      <div class="candle-body"></div>`;
    row.appendChild(c);

    const fl = document.getElementById(`fl-${i}`);
    fl.style.animationDuration = flickerDurations[i] + 's';
    fl.style.animationDelay    = flickerDelays[i]    + 's';

    flames.push(fl);
    smokes.push(document.getElementById(`sm-${i}`));
    flameWraps.push(c.querySelector('.flame-wrap'));
  }

  // ── Sprinkles on cake layers ─────────────────────────────
  (function spawnSprinkles() {
    const SPRINKLE_COLORS = ['#fde68a','#f9a8d4','#fbcfe8','#fda4af','#fdba74','#f472b6','#ec4899','#fef08a','#fca5a5'];
    const tiers = [
      { sel: '.layer-top', count: 8 },
      { sel: '.layer-mid', count: 14 },
      { sel: '.layer-bot', count: 20 },
    ];
    tiers.forEach(({ sel, count }) => {
      const layer = document.querySelector(sel);
      if (!layer) return;
      const wrap = document.createElement('div');
      wrap.className = 'sprinkles';
      for (let i = 0; i < count; i++) {
        const sp = document.createElement('div');
        sp.className = 'sprinkle';
        sp.style.setProperty('--sx', (8 + Math.random() * 84) + '%');
        sp.style.setProperty('--sy', (18 + Math.random() * 70) + '%');
        sp.style.setProperty('--sw', (2 + Math.random() * 1.2).toFixed(1) + 'px');
        sp.style.setProperty('--sh', (4.5 + Math.random() * 3).toFixed(1) + 'px');
        sp.style.setProperty('--sr', (Math.random() * 180 - 90).toFixed(0) + 'deg');
        sp.style.setProperty('--sc', SPRINKLE_COLORS[Math.floor(Math.random() * SPRINKLE_COLORS.length)]);
        wrap.appendChild(sp);
      }
      layer.appendChild(wrap);
    });
  })();

  // ── Cream drips between tiers ─────────────────────────────
  (function spawnTierCream() {
    // Mid tier cream (sits at top edge of layer-mid; spans layer-mid width)
    function makeDrips(parent, baseLeft, baseRight, count, sizeRange) {
      // baseLeft/baseRight = % offsets from container edges
      for (let i = 0; i < count; i++) {
        const d = document.createElement('div');
        d.className = 'cd';
        const t = i / Math.max(1, count - 1);
        // Distribute across width with slight randomness
        const pct = baseLeft + t * (100 - baseLeft - baseRight) + (Math.random() - 0.5) * 4;
        const w = sizeRange[0] + Math.random() * (sizeRange[1] - sizeRange[0]);
        const h = w * (0.85 + Math.random() * 0.55);
        d.style.left = `calc(${pct}% - ${w/2}px)`;
        d.style.setProperty('--w', w + 'px');
        d.style.setProperty('--h', h + 'px');
        d.style.width  = w + 'px';
        d.style.height = h + 'px';
        parent.appendChild(d);
      }
    }
    // Mid: cream drips from top-layer edge onto mid layer (top ~55% of bot width)
    const cMid = document.getElementById('cream-mid');
    if (cMid) makeDrips(cMid, 22.5, 22.5, 7, [10, 15]);
    // Bot: cream drips from mid-layer edge onto bot layer (mid ~77% of bot width)
    const cBot = document.getElementById('cream-bot');
    if (cBot) makeDrips(cBot, 11.5, 11.5, 9, [12, 19]);
  })();

  // ── Ember particles drifting up from each candle ──────────
  let emberInterval = null;
  function startEmbers() {
    emberInterval = setInterval(() => {
      // Pick a random still-burning candle
      const burning = flameWraps.filter((_, i) => !flames[i].classList.contains('out'));
      if (burning.length === 0) { clearInterval(emberInterval); emberInterval = null; return; }
      const wrap = burning[Math.floor(Math.random() * burning.length)];
      const r = wrap.getBoundingClientRect();
      const ex = r.left + r.width / 2 + (Math.random() - 0.5) * 6;
      const ey = r.top + 4;
      const em = document.createElement('div');
      em.className = 'ember';
      em.style.left = ex + 'px';
      em.style.top  = ey + 'px';
      em.style.setProperty('--mid-x', ((Math.random() - 0.5) * 14).toFixed(0) + 'px');
      em.style.setProperty('--end-x', ((Math.random() - 0.5) * 30).toFixed(0) + 'px');
      em.style.setProperty('--dur', (2.2 + Math.random() * 1.6).toFixed(1) + 's');
      const sz = 3 + Math.random() * 2.5;
      em.style.width  = sz + 'px';
      em.style.height = sz + 'px';
      document.body.appendChild(em);
      setTimeout(() => em.remove(), 4200);
    }, 320);
  }
  // Pause embers when tab hidden, resume when visible
  document.addEventListener('visibilitychange', () => {
    if (document.hidden && emberInterval) {
      clearInterval(emberInterval); emberInterval = null;
    } else if (!document.hidden && !emberInterval) {
      startEmbers(); // self-exits if all candles already blown
    }
  });
  startEmbers();

  // ── Confetti ─────────────────────────────────────────────
  function spawnConfetti() {
    const colors = ['#f9a8d4','#fde68a','#ec4899','#fbcfe8','#fda4af','#fdba74','#f472b6','#fef08a'];
    for (let i = 0; i < 28; i++) {
      const p = document.createElement('div');
      p.className = 'confetti-piece';
      const w   = 4 + Math.random() * 5;
      const h   = 5 + Math.random() * 8;
      const dur = 3.2 + Math.random() * 2.8;
      const delay = Math.random() * 1.1;
      p.style.cssText = `
        --color:${colors[Math.floor(Math.random()*colors.length)]};
        --w:${w}px; --h:${h}px;
        --x:${Math.random()*100}%;
        --dur:${dur}s; --delay:${delay}s;
        --sway:${-60+Math.random()*120}px;
        --spin:${180+Math.random()*360}deg;
        border-radius:${Math.random()>.5?'2px':'50%'};
      `;
      document.body.appendChild(p);
      setTimeout(() => p.remove(), (dur + delay + 0.5) * 1000);
    }
  }

  // ── Blow logic ───────────────────────────────────────────
  let blown = false;
  const hintEl  = document.getElementById('hint');
  const wishMsg = document.getElementById('wish-msg');
  const cakeEl  = document.getElementById('cake');
  const glowEl  = document.getElementById('cake-glow');
  const gifGallery = document.getElementById('gif-gallery');
  const memoryFrames = [...document.querySelectorAll('.memory-gif')];
  const FIRST_BLOW_DELAY_MS = 800;
  const BLOW_STEP_MS = 1600;
  const LAST_BLOW_MS = FIRST_BLOW_DELAY_MS + BLOW_STEP_MS * (N_CANDLES - 1);
  const WISH_DELAY_MS = LAST_BLOW_MS + 1700;
  const NAV_DELAY_MS = 12000;

  function highlightMemory(i) {
    gifGallery.classList.toggle('sticker-centered', i === N_CANDLES - 1);
    memoryFrames.forEach((frame, idx) => {
      frame.classList.toggle('is-active', idx === i);
      if (idx <= i && idx < N_CANDLES - 1) frame.classList.add('is-highlighted');
    });
  }

  function blowCandle(i) {
    flames[i].classList.add('out');
    smokes[i].classList.add('puff');
    highlightMemory(i);

    // 2 extra drift puffs
    [-1, 1].forEach((dir, j) => {
      const extra = document.createElement('div');
      extra.className = 'smoke-extra';
      extra.style.setProperty('--drift', dir * (12 + Math.random() * 12) + 'px');
      extra.style.animationDelay = (j * 0.18) + 's';
      flameWraps[i].appendChild(extra);
      setTimeout(() => extra.remove(), 2400);
    });
  }

  // ── Blow: pointerdown + movement threshold (avoid firing on scroll) ──
  let pointerStartX = 0, pointerStartY = 0, pointerMoved = false;
  cakeEl.addEventListener('pointerdown', (e) => {
    pointerStartX = e.clientX; pointerStartY = e.clientY; pointerMoved = false;
  });
  cakeEl.addEventListener('pointermove', (e) => {
    if (Math.abs(e.clientX - pointerStartX) > 8 || Math.abs(e.clientY - pointerStartY) > 8)
      pointerMoved = true;
  });
  cakeEl.addEventListener('pointerup', doBlow);
  function doBlow() {
    if (pointerMoved || blown) return;
    blown = true;
    document.body.style.pointerEvents = 'none';
    muteBtn.style.pointerEvents = 'auto'; // keep mute clickable
    playBtn.style.pointerEvents = 'auto'; // keep autoplay-fallback clickable too

    // Haptic on mobile
    if (navigator.vibrate) navigator.vibrate(50);

    // Camera shake
    cakeEl.classList.add('shake');
    setTimeout(() => cakeEl.classList.remove('shake'), 320);

    // Blow candles slowly: each candle highlights one matching GIF.
    for (let i = 0; i < N_CANDLES; i++) {
      setTimeout(() => blowCandle(i), FIRST_BLOW_DELAY_MS + i * BLOW_STEP_MS);
    }

    // Hint fades
    setTimeout(() => { hintEl.style.opacity = '0'; }, 900);

    // Glow fades → "tắt đèn" effect
    setTimeout(() => { glowEl.classList.add('out'); }, WISH_DELAY_MS - 600);

    // Wish + confetti, then navigate. Total flow is about 12 seconds.
    setTimeout(() => {
      wishMsg.classList.add('show');
      spawnConfetti();
    }, WISH_DELAY_MS);

    setTimeout(() => {
      sessionStorage.setItem('seenSticker', '1');
      navigateTo('stars.html');
    }, NAV_DELAY_MS);
  }
</script>
</body>
