<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Make a Wish ✨</title>
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100vh; height: 100dvh;
      overflow: hidden;
      background: #000;
      cursor: pointer;
    }

    body { animation: fadein 1s ease forwards; }
    @keyframes fadein { from { opacity: 0; } to { opacity: 1; } }

    canvas { position: fixed; inset: 0; display: block; }

    /* ===== SCENE ===== */
    #scene {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: clamp(16px, 3vh, 28px);
      z-index: 2;
      pointer-events: none;
    }

    #hint {
      font-family: 'Dancing Script', cursive;
      font-size: clamp(20px, 4.5vw, 34px);
      color: rgba(220, 180, 255, 0.92);
      text-shadow: 0 0 24px rgba(180, 60, 255, 0.7);
      animation: pulse-text 2s ease-in-out infinite;
      letter-spacing: 0.5px;
      transition: opacity 0.8s ease;
    }
    @keyframes pulse-text {
      0%, 100% { opacity: 0.72; }
      50%       { opacity: 1;    }
    }

    /* ===== HALO GLOW (warm candlelight under cake) ===== */
    #cake-glow {
      position: fixed;
      bottom: 28%;
      left: 50%;
      transform: translateX(-50%);
      width: clamp(280px, 50vw, 480px);
      height: 70px;
      background: radial-gradient(ellipse at center,
        rgba(255,180,50,0.22) 0%,
        rgba(255,120,20,0.1)  45%,
        transparent 72%);
      pointer-events: none;
      z-index: 1;
      transition: opacity 1.6s ease;
    }
    #cake-glow.out { opacity: 0; }

    /* ===== CAKE ===== */
    .cake { display: flex; flex-direction: column; align-items: center; }

    .candles-row {
      display: flex;
      gap: clamp(14px, 3.5vw, 26px);
      margin-bottom: -2px;
      position: relative;
      z-index: 3;
      align-items: flex-end;
    }

    .candle {
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
    }

    .flame-wrap {
      position: relative;
      width: clamp(12px, 2vw, 16px);
      height: clamp(22px, 3.5vw, 30px);
      display: flex;
      align-items: flex-end;
      justify-content: center;
    }

    /* Flame — duration/delay set per-candle via JS for random flicker */
    .flame {
      width: clamp(10px, 1.8vw, 14px);
      height: clamp(18px, 3vw, 24px);
      background: radial-gradient(ellipse at 50% 80%,
        #fff 0%, #ffe066 22%, #ff9500 52%, rgba(255,60,0,0.25) 82%, transparent 100%);
      border-radius: 50% 50% 30% 30% / 60% 60% 40% 40%;
      animation: flicker 0.22s ease-in-out infinite alternate;
      filter: drop-shadow(0 0 7px rgba(255,180,0,0.95));
      transition: opacity 0.35s ease, transform 0.35s ease;
      flex-shrink: 0;
    }
    @keyframes flicker {
      0%   { transform: scaleX(1)    scaleY(1)    rotate(-2deg); }
      100% { transform: scaleX(0.82) scaleY(0.88) rotate(2.5deg); }
    }
    .flame.out { opacity: 0; transform: scaleY(0) !important; }

    /* Smoke — base puff */
    .smoke {
      position: absolute;
      top: -2px; left: 50%;
      transform: translateX(-50%);
      width: 5px; height: 28px;
      opacity: 0;
      background: linear-gradient(to top, rgba(200,180,220,0.6), transparent);
      border-radius: 50%;
      pointer-events: none;
    }
    .smoke.puff { animation: smoke-up 1.9s ease-out forwards; }
    @keyframes smoke-up {
      0%   { opacity: 0.65; transform: translateX(-50%) translateY(0)    scaleX(1);   }
      40%  { opacity: 0.35; transform: translateX(-55%) translateY(-20px) scaleX(1.9); }
      100% { opacity: 0;    transform: translateX(-48%) translateY(-46px) scaleX(3.2); }
    }

    /* Extra drift puffs — drift direction via --drift CSS var */
    .smoke-extra {
      position: absolute;
      top: -2px; left: 50%;
      width: 4px; height: 22px;
      opacity: 0;
      background: linear-gradient(to top, rgba(200,180,220,0.5), transparent);
      border-radius: 50%;
      pointer-events: none;
      animation: smoke-drift 2.1s ease-out forwards;
    }
    @keyframes smoke-drift {
      0%   { opacity: 0.55; transform: translateX(-50%) translateY(0) scaleX(1); }
      45%  { opacity: 0.28; transform: translateX(calc(-50% + var(--drift, 14px))) translateY(-26px) scaleX(2); }
      100% { opacity: 0;    transform: translateX(calc(-50% + calc(var(--drift, 14px) * 1.6))) translateY(-54px) scaleX(3.5); }
    }

    /* Candle body */
    .candle-body {
      width: clamp(12px, 2vw, 16px);
      height: clamp(30px, 5vw, 46px);
      background: linear-gradient(170deg, #e8d0ff 0%, #b87ee0 45%, #7030b0 100%);
      border-radius: 3px 3px 1px 1px;
      box-shadow: inset -2px 0 5px rgba(0,0,0,0.25), 0 0 8px rgba(160,80,255,0.3);
      position: relative;
    }
    .candle-body::before {
      content: '';
      position: absolute;
      top: -5px; left: 50%;
      transform: translateX(-50%);
      width: 2px; height: 6px;
      background: #1a0028;
      border-radius: 1px;
    }
    .candle-body::after {
      content: '';
      position: absolute;
      top: 30%; left: 0; right: 0;
      height: 2px;
      background: rgba(230,180,255,0.35);
    }

    /* Camera shake on blow */
    .cake.shake { animation: cam-shake 0.28s ease; }
    @keyframes cam-shake {
      0%   { transform: translateX(0);   }
      20%  { transform: translateX(-3px); }
      40%  { transform: translateX(3px);  }
      60%  { transform: translateX(-2px); }
      80%  { transform: translateX(2px);  }
      100% { transform: translateX(0);   }
    }

    /* Cake layers */
    .layer { border-radius: 6px; position: relative; overflow: hidden; }
    .layer::after {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, transparent, rgba(220,160,255,0.3), transparent);
    }

    .layer-top {
      width: clamp(130px, 22vw, 200px);
      height: clamp(34px, 5.5vw, 52px);
      background: linear-gradient(180deg, #3d0068 0%, #220040 100%);
      border: 1px solid rgba(190,100,255,0.5);
      box-shadow: 0 0 20px rgba(150,50,255,0.3), inset 0 1px 0 rgba(230,170,255,0.15);
    }
    .layer-top::before {
      content: '· · · · ·';
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%,-50%);
      color: rgba(200,140,255,0.3);
      font-size: 11px;
      letter-spacing: 7px;
      white-space: nowrap;
    }

    .layer-mid {
      width: clamp(185px, 31vw, 285px);
      height: clamp(42px, 7vw, 64px);
      background: linear-gradient(180deg, #300054 0%, #1c0038 100%);
      border: 1px solid rgba(165,75,230,0.4);
      box-shadow: 0 0 16px rgba(120,35,210,0.25);
      margin-top: -1px;
    }
    /* "22" pulsing with candle glow rhythm */
    .layer-mid::before {
      content: '22';
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%,-50%);
      font-family: 'Dancing Script', cursive;
      font-size: clamp(18px, 3vw, 26px);
      color: rgba(215,160,255,0.42);
      letter-spacing: 3px;
      animation: num-pulse 2.1s ease-in-out infinite;
    }
    @keyframes num-pulse {
      0%, 100% { color: rgba(210,150,255,0.38); text-shadow: none; }
      50%       { color: rgba(225,175,255,0.68); text-shadow: 0 0 14px rgba(200,140,255,0.55); }
    }

    .layer-bot {
      width: clamp(240px, 40vw, 375px);
      height: clamp(50px, 8.5vw, 78px);
      background: linear-gradient(180deg, #280044 0%, #140022 100%);
      border: 1px solid rgba(145,55,200,0.35);
      box-shadow: 0 0 24px rgba(110,25,200,0.3);
      margin-top: -1px;
    }
    .layer-bot::before {
      content: '· · · · ·';
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%,-50%);
      color: rgba(200,140,255,0.3);
      font-size: 11px;
      letter-spacing: 7px;
      white-space: nowrap;
    }

    /* Frosting drips */
    .drips {
      display: flex;
      width: clamp(130px, 22vw, 200px);
      justify-content: space-around;
      margin-bottom: -1px;
      position: relative;
      z-index: 2;
    }
    .drip {
      width: clamp(10px, 1.6vw, 14px);
      height: clamp(8px, 1.4vw, 12px);
      background: rgba(200,140,255,0.2);
      border-radius: 0 0 50% 50%;
      border: 1px solid rgba(200,140,255,0.35);
      border-top: none;
    }

    .plate {
      width: clamp(265px, 44vw, 415px);
      height: clamp(10px, 1.6vw, 14px);
      background: linear-gradient(180deg, rgba(160,80,255,0.18), transparent);
      border-radius: 50%;
      border: 1px solid rgba(160,80,255,0.18);
      margin-top: 2px;
    }

    /* ===== WISH MESSAGE ===== */
    #wish-msg {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10;
      pointer-events: none;
      opacity: 0;
    }
    #wish-msg.show { animation: wish-fade 2.8s ease forwards; }
    @keyframes wish-fade {
      0%   { opacity: 0; }
      22%  { opacity: 1; }
      75%  { opacity: 1; }
      100% { opacity: 0; }
    }
    #wish-msg span {
      font-family: 'Dancing Script', cursive;
      font-size: clamp(26px, 5.5vw, 50px);
      color: #fff8e0;
      text-shadow: 0 0 20px rgba(255,200,60,0.9), 0 0 50px rgba(255,150,0,0.5);
      text-align: center;
      padding: 0 20px;
    }

    /* ===== CONFETTI ===== */
    .confetti-piece {
      position: fixed;
      width: var(--w, 6px);
      height: var(--h, 8px);
      background: var(--color, #ff69b4);
      top: -12px;
      left: var(--x, 50%);
      z-index: 14;
      pointer-events: none;
      opacity: 1;
      animation: confetti-fall var(--dur, 3s) ease-in var(--delay, 0s) forwards;
    }
    @keyframes confetti-fall {
      0%   { top: -12px; transform: rotate(0deg) translateX(0); opacity: 1; }
      80%  { opacity: 1; }
      100% { top: 110vh;  transform: rotate(var(--spin, 360deg)) translateX(var(--sway, 30px)); opacity: 0; }
    }

    /* ===== MUTE BUTTON ===== */
    #mute-btn {
      position: fixed;
      top: 14px; right: 14px;
      z-index: 20;
      width: 36px; height: 36px;
      border-radius: 50%;
      background: rgba(70,8,140,0.38);
      border: 1px solid rgba(180,100,255,0.42);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 16px;
      backdrop-filter: blur(4px);
      transition: background 0.2s;
      pointer-events: auto;
    }
    #mute-btn:hover { background: rgba(100,15,180,0.55); }

    /* ===== STICKER ===== */
    #sticker-wrap {
      position: fixed; inset: 0; z-index: 15;
      display: flex; align-items: center; justify-content: center;
      pointer-events: none;
    }
    .sticker-img {
      max-width: min(60vw, 420px); max-height: min(60vh, 420px);
      filter: drop-shadow(0 0 30px rgba(180,120,255,0.5));
      animation: sticker-show 4.5s cubic-bezier(0.34,1.56,0.64,1) forwards;
    }
    @keyframes sticker-show {
      0%   { opacity: 0; transform: scale(0.4) rotate(-8deg); }
      12%  { opacity: 1; transform: scale(1.15) rotate(4deg); }
      22%  { opacity: 1; transform: scale(1)    rotate(0deg); }
      75%  { opacity: 1; transform: scale(1)    rotate(0deg); }
      100% { opacity: 0; transform: scale(1.2)  rotate(2deg); }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }

    /* ===== AUTOPLAY BUTTON ===== */
    #play-btn {
      position: fixed; bottom: 22px; left: 50%;
      transform: translateX(-50%);
      z-index: 200; display: none;
      align-items: center; gap: 8px;
      background: rgba(110,20,190,0.88);
      border: 1px solid rgba(200,140,255,0.65);
      border-radius: 24px; padding: 10px 24px;
      color: #f0d8ff; font-size: 15px; cursor: pointer;
      backdrop-filter: blur(10px);
      font-family: 'Dancing Script', cursive;
      white-space: nowrap;
      animation: play-pulse 1.8s ease-in-out infinite;
    }
    @keyframes play-pulse {
      0%,100% { box-shadow: 0 0 0 0 rgba(160,60,255,0.55); }
      50%     { box-shadow: 0 0 0 14px rgba(160,60,255,0); }
    }

    /* Page-out transition overlay */
    #nav-overlay {
      position: fixed; inset: 0; background: #000;
      z-index: 9999; opacity: 0;
      transition: opacity 0.42s ease;
      pointer-events: none;
    }

    /* Sticker clickable hint */
    #sticker-wrap { cursor: pointer; }
  </style>
</head>
<body>
<canvas id="c"></canvas>
<div id="cake-glow"></div>

<div id="scene">
  <div id="hint">Ước một điều thật to nha</div>
  <div class="cake" id="cake">
    <div class="candles-row" id="candles-row"></div>
    <div class="drips" id="drips"></div>
    <div class="layer layer-top"></div>
    <div class="layer layer-mid"></div>
    <div class="layer layer-bot"></div>
    <div class="plate"></div>
  </div>
</div>

<div id="wish-msg"><span>✨ Hép pi bớt đâyyyy!</span></div>
<div id="sticker-wrap"></div>
<button id="mute-btn" aria-label="Tắt/bật nhạc">🔊</button>
<div id="nav-overlay"></div>
<button id="play-btn" aria-label="Bật nhạc">▶ Bật nhạc</button>

<script>
  // ── Stars background ─────────────────────────────────────
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');
  let gradient;

  const isMobile = window.innerWidth < 768;
  const STAR_COUNT = isMobile ? 120 : 260;

  function resize() {
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
    gradient = ctx.createRadialGradient(
      canvas.width*.5, canvas.height*.3, 0,
      canvas.width*.5, canvas.height*.5, canvas.height
    );
    gradient.addColorStop(0,   '#0d0a2e');
    gradient.addColorStop(0.4, '#070518');
    gradient.addColorStop(1,   '#000008');
  }

  let stars = [];
  function initStars() {
    const palette = [[255,255,255],[220,210,255],[200,220,255],[255,240,210]];
    stars = Array.from({ length: STAR_COUNT }, () => ({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      r: Math.random() * 1.5 + 0.2,
      alpha: Math.random(),
      speed: Math.random() * 0.006 + 0.002,
      dir: Math.random() > 0.5 ? 1 : -1,
      color: palette[Math.floor(Math.random() * palette.length)],
    }));
  }

  let shooters = [];
  setInterval(() => {
    shooters.push({
      x: Math.random()*canvas.width*0.8, y: Math.random()*canvas.height*0.4,
      len: Math.random()*120+60, spd: Math.random()*10+8, alpha: 1, tail: 0,
    });
  }, 3500);

  function drawFrame() {
    ctx.fillStyle = gradient;
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    for (const s of stars) {
      s.alpha += s.speed * s.dir;
      if (s.alpha >= 1)   { s.alpha = 1;   s.dir = -1; }
      if (s.alpha <= 0.1) { s.alpha = 0.1; s.dir =  1; }
      const [r,g,b] = s.color;
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI*2);
      ctx.fillStyle = `rgba(${r},${g},${b},${s.alpha})`;
      ctx.fill();
    }
    shooters = shooters.filter(sh => sh.alpha > 0);
    for (const sh of shooters) {
      sh.tail += sh.spd; sh.alpha -= 0.018;
      const g2 = ctx.createLinearGradient(sh.x+sh.tail-sh.len, sh.y+sh.tail-sh.len, sh.x+sh.tail, sh.y+sh.tail);
      g2.addColorStop(0, 'rgba(255,255,255,0)');
      g2.addColorStop(1, `rgba(255,255,255,${sh.alpha})`);
      ctx.beginPath();
      ctx.moveTo(sh.x+sh.tail-sh.len, sh.y+sh.tail-sh.len);
      ctx.lineTo(sh.x+sh.tail, sh.y+sh.tail);
      ctx.strokeStyle = g2; ctx.lineWidth = 1.5; ctx.stroke();
    }
    requestAnimationFrame(drawFrame);
  }

  resize(); initStars();
  window.addEventListener('resize', () => { resize(); initStars(); });
  drawFrame();

  // ── Music ────────────────────────────────────────────────
  const music = new Audio('data/music_2.mp3');
  music.loop = true;
  music.currentTime = parseFloat(sessionStorage.getItem('musicTime') || '0');
  const playBtn = document.getElementById('play-btn');
  music.play().catch(() => { playBtn.style.display = 'flex'; });
  playBtn.addEventListener('click', () => {
    music.play().catch(() => {});
    playBtn.style.display = 'none';
  });

  // ── Navigate with fade + volume fade ────────────────────
  const navOverlay = document.getElementById('nav-overlay');
  function navigateTo(href) {
    navOverlay.style.pointerEvents = 'all';
    navOverlay.style.opacity = '1';
    const origVol = music.volume;
    let step = 0;
    const iv = setInterval(() => {
      step++;
      music.volume = Math.max(0, origVol * (1 - step / 20));
      if (step >= 20) {
        clearInterval(iv);
        sessionStorage.setItem('musicTime',
          music.readyState >= 2 ? music.currentTime : parseFloat(sessionStorage.getItem('musicTime') || '0'));
        window.location.href = href;
      }
    }, 20);
  }

  // ── Tab visibility — pause shooting stars ────────────────
  document.addEventListener('visibilitychange', () => {
    if (document.hidden) shooters.length = 0; // clear queue when hidden
  });

  // Mute toggle
  const muteBtn = document.getElementById('mute-btn');
  let muted = false;
  muteBtn.addEventListener('click', e => {
    e.stopPropagation();
    muted = !muted;
    music.muted = muted;
    muteBtn.textContent = muted ? '🔇' : '🔊';
  });

  // ── Build cake ───────────────────────────────────────────
  const N_CANDLES = 5;
  const row   = document.getElementById('candles-row');
  const drips = document.getElementById('drips');

  for (let i = 0; i < 7; i++) {
    const d = document.createElement('div');
    d.className = 'drip';
    drips.appendChild(d);
  }

  // Randomised flicker timing per candle
  const flickerDurations = [0.19, 0.24, 0.21, 0.27, 0.18];
  const flickerDelays    = [0,    0.07, 0.14, 0.04, 0.11 ];

  const flames = [], smokes = [], flameWraps = [];
  for (let i = 0; i < N_CANDLES; i++) {
    const c = document.createElement('div');
    c.className = 'candle';
    c.innerHTML = `
      <div class="flame-wrap">
        <div class="flame" id="fl-${i}"></div>
        <div class="smoke" id="sm-${i}"></div>
      </div>
      <div class="candle-body"></div>`;
    row.appendChild(c);

    const fl = document.getElementById(`fl-${i}`);
    fl.style.animationDuration = flickerDurations[i] + 's';
    fl.style.animationDelay    = flickerDelays[i]    + 's';

    flames.push(fl);
    smokes.push(document.getElementById(`sm-${i}`));
    flameWraps.push(c.querySelector('.flame-wrap'));
  }

  // ── Confetti ─────────────────────────────────────────────
  function spawnConfetti() {
    const colors = ['#ff6eb4','#ffd700','#b06fff','#5bc8ff','#7dff7d','#ff7d5b','#ffb347'];
    for (let i = 0; i < 50; i++) {
      const p = document.createElement('div');
      p.className = 'confetti-piece';
      const w   = 4 + Math.random() * 6;
      const h   = 5 + Math.random() * 9;
      const dur = 2.4 + Math.random() * 2.2;
      const delay = Math.random() * 0.9;
      p.style.cssText = `
        --color:${colors[Math.floor(Math.random()*colors.length)]};
        --w:${w}px; --h:${h}px;
        --x:${Math.random()*100}%;
        --dur:${dur}s; --delay:${delay}s;
        --sway:${-60+Math.random()*120}px;
        --spin:${180+Math.random()*360}deg;
        border-radius:${Math.random()>.5?'2px':'50%'};
      `;
      document.body.appendChild(p);
      setTimeout(() => p.remove(), (dur + delay + 0.5) * 1000);
    }
  }

  // ── Blow logic ───────────────────────────────────────────
  let blown = false;
  const hintEl  = document.getElementById('hint');
  const wishMsg = document.getElementById('wish-msg');
  const cakeEl  = document.getElementById('cake');
  const glowEl  = document.getElementById('cake-glow');

  function blowCandle(i) {
    flames[i].classList.add('out');
    smokes[i].classList.add('puff');

    // 2 extra drift puffs
    [-1, 1].forEach((dir, j) => {
      const extra = document.createElement('div');
      extra.className = 'smoke-extra';
      extra.style.setProperty('--drift', dir * (12 + Math.random() * 12) + 'px');
      extra.style.animationDelay = (j * 0.18) + 's';
      flameWraps[i].appendChild(extra);
      setTimeout(() => extra.remove(), 2400);
    });
  }

  // ── Blow: pointerdown + movement threshold (avoid firing on scroll) ──
  let pointerStartX = 0, pointerStartY = 0, pointerMoved = false;
  document.body.addEventListener('pointerdown', (e) => {
    pointerStartX = e.clientX; pointerStartY = e.clientY; pointerMoved = false;
  });
  document.body.addEventListener('pointermove', (e) => {
    if (Math.abs(e.clientX - pointerStartX) > 8 || Math.abs(e.clientY - pointerStartY) > 8)
      pointerMoved = true;
  });
  document.body.addEventListener('pointerup', doBlow);
  function doBlow() {
    if (pointerMoved || blown) return;
    blown = true;
    document.body.style.pointerEvents = 'none';
    muteBtn.style.pointerEvents = 'auto'; // keep mute clickable

    // Haptic on mobile
    if (navigator.vibrate) navigator.vibrate(50);

    // Camera shake
    cakeEl.classList.add('shake');
    setTimeout(() => cakeEl.classList.remove('shake'), 320);

    // Blow candles
    for (let i = 0; i < N_CANDLES; i++) {
      setTimeout(() => blowCandle(i), i * 360);
    }

    // Hint fades
    setTimeout(() => { hintEl.style.opacity = '0'; }, 280);

    // Glow fades → "tắt đèn" effect
    setTimeout(() => { glowEl.classList.add('out'); }, N_CANDLES * 360 + 100);

    // Wish + confetti, then sticker, then navigate
    setTimeout(() => {
      wishMsg.classList.add('show');
      spawnConfetti();

      // Show sticker.gif after wish text peaks (≈2 s overlap while wish fades)
      setTimeout(() => {
        const wrap = document.getElementById('sticker-wrap');
        const img  = document.createElement('img');
        img.src   = 'data/sticker.gif';
        img.className = 'sticker-img';
        wrap.appendChild(img);
        wrap.style.pointerEvents = 'auto';

        // Click sticker → navigate immediately
        let stickerClicked = false;
        wrap.addEventListener('click', () => {
          if (stickerClicked) return;
          stickerClicked = true;
          sessionStorage.setItem('seenSticker', '1');
          navigateTo('stars.html');
        });
      }, 2000);

      // Navigate after sticker animation finishes (~4.5 s after it appears)
      setTimeout(() => {
        sessionStorage.setItem('seenSticker', '1');
        navigateTo('stars.html');
      }, 6400);
    }, N_CANDLES * 360 + 320);
  }
</script>
</body>
</html>
